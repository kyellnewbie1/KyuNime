<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Loading • KyuNimeID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* reset & body */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0f19;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* background blur / glass overlay */
        .loading-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(11, 15, 25, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .loading-card {
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 3rem;
            padding: 2.5rem 2.8rem;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(168, 85, 247, 0.15);
            animation: popIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-origin: center;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.92) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Logo KyuNimeID */
        .logo {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #a855f7, #ec4899, #8b5cf6, #a855f7);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 4s ease infinite;
            display: inline-block;
            margin-bottom: 0.25rem;
        }
        .logo-sub {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: #9ca3af;
            text-transform: uppercase;
            margin-top: -4px;
            display: block;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* spinner neon */
        .spinner {
            width: 60px;
            height: 60px;
            margin: 1.8rem auto 1.2rem;
            border-radius: 50%;
            border: 4px solid rgba(168, 85, 247, 0.15);
            border-top-color: #a855f7;
            border-right-color: #ec4899;
            animation: spin 1s cubic-bezier(0.6, 0.0, 0.4, 1.0) infinite;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.25);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* progress bar mewah */
        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 999px;
            overflow: hidden;
            margin: 1.5rem 0 1.2rem;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #a855f7, #ec4899, #8b5cf6);
            background-size: 200% 100%;
            border-radius: 999px;
            transition: width 0.3s ease;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        /* status teks */
        .status-text {
            font-size: 0.9rem;
            font-weight: 600;
            color: #d1d5db;
            min-height: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .status-text i {
            color: #a855f7;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .dot-pulse {
            display: inline-flex;
            gap: 4px;
            margin-left: 4px;
        }
        .dot-pulse span {
            width: 6px;
            height: 6px;
            background: #a855f7;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.2s infinite;
        }
        .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
        .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* footer kecil */
        .footer-credit {
            margin-top: 1.8rem;
            font-size: 0.6rem;
            color: #4b5563;
            letter-spacing: 0.1em;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 1.2rem;
        }

        /* responsive */
        @media (max-width: 480px) {
            .loading-card { padding: 2rem 1.5rem; border-radius: 2rem; }
            .logo { font-size: 2.4rem; }
            .spinner { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>

    <!-- Background dinamis (dari config.js) akan diisi oleh script -->
    <div class="loading-wrapper" id="loadingWrapper">
        <div class="loading-card">

            <!-- Logo KyuNimeID -->
            <div>
                <span class="logo">KyuNimeID</span>
                <span class="logo-sub">Streaming • Anime • Indonesia</span>
            </div>

            <!-- Spinner -->
            <div class="spinner"></div>

            <!-- Progress Bar -->
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <!-- Status Teks Dinamis -->
            <div class="status-text" id="statusText">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
                <span id="statusMessage">Mempersiapkan lingkungan</span>
                <div class="dot-pulse">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer-credit">
                <i class="fa-regular fa-copyright"></i> 2026 KyuNimeID • semua siap
            </div>

        </div>
    </div>

    <!-- Load konfigurasi & supabase (opsional untuk background) -->
    <script src="config.js"></script>
    <script>
        (function() {

            // --- DAFTAR PESAN LOADING (simulasi) ---
            const messages = [
                { text: "Menyiapkan database streaming", icon: "fa-database" },
                { text: "Mengunduh resource terbaru", icon: "fa-cloud-download-alt" },
                { text: "Mengoptimalkan player video", icon: "fa-film" },
                { text: "Memuat library subtitle", icon: "fa-language" },
                { text: "Menyusun daftar episode", icon: "fa-list" },
                { text: "Menyiapkan tampilan antarmuka", icon: "fa-paint-brush" },
                { text: "Mengaktifkan mode keren", icon: "fa-wand-magic-sparkles" },
                { text: "Hampir selesai…", icon: "fa-check-circle" }
            ];

            // --- VARIABEL ---
            const progressFill = document.getElementById('progressFill');
            const statusMessage = document.getElementById('statusMessage');
            const statusIcon = document.querySelector('.status-text i');

            let step = 0;
            const totalSteps = messages.length;
            const duration = 6000; // total waktu loading (ms) → 6 detik
            const intervalTime = duration / totalSteps; // waktu per pesan

            // --- TERAPKAN BACKGROUND DARI CONFIG (jika ada) ---
            function applyBackground() {
                const wrapper = document.getElementById('loadingWrapper');
                let bgUrl = null;

                // coba ambil dari CONFIG (global)
                if (typeof CONFIG !== 'undefined' && CONFIG.DEFAULT_BACKGROUND) {
                    bgUrl = CONFIG.DEFAULT_BACKGROUND;
                }

                // jika ada session & profile background, lebih prioritas
                // tapi kita tidak perlu repot karena hanya loading, cukup pakai default
                if (bgUrl) {
                    wrapper.style.backgroundImage = `url('${bgUrl}')`;
                    wrapper.style.backgroundSize = 'cover';
                    wrapper.style.backgroundPosition = 'center';
                    wrapper.style.backgroundAttachment = 'fixed';
                } else {
                    // fallback warna solid
                    wrapper.style.background = '#0b0f19';
                }
            }

            // --- UPDATE PROGRESS & TEKS ---
            function updateLoading() {
                if (step >= totalSteps) {
                    // selesai, redirect ke index
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 300); // kasih jeda 300ms biar terasa
                    return;
                }

                // ambil pesan
                const msg = messages[step];
                const progress = ((step + 1) / totalSteps) * 100;

                // update progress bar
                progressFill.style.width = progress + '%';

                // update teks & icon
                statusMessage.textContent = msg.text;
                statusIcon.className = `fa-solid ${msg.icon}`;

                step++;
            }

            // --- JALANKAN ---
            applyBackground();

            // mulai update pertama
            updateLoading();

            // jalankan timer setiap interval
            const timer = setInterval(() => {
                updateLoading();
                if (step >= totalSteps) {
                    clearInterval(timer);
                }
            }, intervalTime);

            // cadangan: jika timer selesai tapi redirect belum terjadi (antisipasi)
            setTimeout(() => {
                if (step >= totalSteps) {
                    // sudah di-handle di updateLoading
                } else {
                    // paksa selesai
                    step = totalSteps;
                    progressFill.style.width = '100%';
                    statusMessage.textContent = 'Siap! Mengalihkan...';
                    statusIcon.className = 'fa-solid fa-circle-check';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 400);
                }
            }, duration + 500);

        })();
    </script>
</body>
</html>
