<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilku - KyuNimeID</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: #0b0f19; 
            color: #e2e8f0; 
            font-family: 'Poppins', sans-serif;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Efek Bling-Bling Merah Neon Khusus Akun Owner */
        .owner-glow {
            text-shadow: 0 0 8px rgba(239, 68, 68, 0.9), 0 0 20px rgba(220, 38, 38, 0.6);
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.4), inset 0 0 8px rgba(239, 68, 68, 0.3);
            animation: redBling 2s infinite alternate;
        }
        @keyframes redBling {
            0% { border-color: rgba(239, 68, 68, 0.5); transform: scale(1); }
            50% { border-color: rgba(248, 113, 113, 0.9); }
            100% { border-color: rgba(220, 38, 38, 0.6); transform: scale(1.03); }
        }
    </style>
</head>
<body id="dynamic-bg" class="relative min-h-screen">
    <!-- Premium Dark Overlay -->
    <div class="fixed inset-0 bg-gradient-to-b from-[#0b0f19]/90 via-[#0b0f19]/95 to-[#0b0f19] -z-10"></div>

    <!-- PRO NAVBAR -->
    <nav class="bg-[#111827]/80 backdrop-blur-xl border-b border-gray-800/60 sticky top-0 z-50 px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500 tracking-wider hover:scale-105 transition duration-300">Kyu<span class="text-white">NimeID</span></a>
            <a href="index.html" class="text-xs font-bold text-gray-400 hover:text-purple-400 transition flex items-center gap-1.5 bg-[#1f2937]/40 px-3 py-2 rounded-xl border border-gray-800/60">
                <i class="fa-solid fa-house"></i> Beranda
            </a>
        </div>
    </nav>

    <!-- MAIN CONTAINER -->
    <main class="max-w-md mx-auto px-4 py-10 animate-fade-in">
        
        <!-- LOADING SPINNER -->
        <div id="profile-loading" class="flex justify-center items-center py-12">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-purple-500"></div>
        </div>

        <!-- 1. KOTAK LOGIN / DAFTAR -->
        <div id="auth-box" class="hidden bg-[#111827]/60 border border-gray-800/80 rounded-2xl p-6 backdrop-blur-md shadow-2xl">
            <h2 id="auth-title" class="text-lg font-black text-white text-center mb-1">Selamat Datang Wokk!</h2>
            <p id="auth-desc" class="text-[11px] text-gray-500 text-center mb-6">Silakan masuk atau buat akun baru untuk akses streaming.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Alamat Email</label>
                    <input type="email" id="auth-email" placeholder="nama@email.com" class="w-full bg-[#1f2937]/40 text-xs text-white px-4 py-3 rounded-xl border border-gray-800 focus:outline-none focus:border-purple-500 transition">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Kata Sandi</label>
                    <input type="password" id="auth-password" placeholder="••••••••" class="w-full bg-[#1f2937]/40 text-xs text-white px-4 py-3 rounded-xl border border-gray-800 focus:outline-none focus:border-purple-500 transition">
                </div>

                <button id="btn-primary" onclick="handleAuth()" class="w-full text-xs bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 py-3 rounded-xl font-bold text-white shadow-lg shadow-purple-900/20 transition duration-300 mt-2">
                    Masuk Sekarang
                </button>

                <div class="text-center mt-4">
                    <button id="btn-toggle" onclick="toggleAuthMode()" class="text-[11px] text-purple-400 hover:underline font-semibold">
                        Belum punya akun? Daftar Baru Disini
                    </button>
                </div>
            </div>
        </div>

        <!-- 2. KOTAK DASHBOARD PROFIL -->
        <div id="profile-box" class="hidden bg-[#111827]/60 border border-gray-800/80 rounded-3xl p-6 backdrop-blur-md shadow-2xl relative overflow-hidden text-center">
            <!-- Badge Role Premium -->
            <div class="absolute top-4 right-4">
                <span id="user-role" class="text-[9px] font-black uppercase tracking-widest px-2.5 py-1 rounded-lg bg-gray-800 text-gray-400 border border-gray-700/60 transition-all duration-300">
                    Memuat...
                </span>
            </div>

            <!-- Avatar Section -->
            <div class="relative w-20 h-20 mx-auto mt-4 mb-4">
                <img id="user-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=Kyu" class="w-full h-full rounded-2xl object-cover border-2 border-purple-500/40 p-1 bg-slate-900">
            </div>

            <!-- Name & Bio -->
            <h2 id="user-username" class="text-base font-black text-white">@username</h2>
            <p id="user-bio" class="text-xs text-gray-400 mt-1 px-4 italic">"Membaca data profil..."</p>

            <!-- FORM EDIT PROFIL (Bisa Ganti Foto, Username, Bio Langsung) -->
            <div id="edit-profile-zone" class="mt-4 border-t border-gray-800/60 pt-4 text-left hidden">
                <p class="text-[11px] font-bold text-purple-400 uppercase tracking-wider mb-3"><i class="fa-solid fa-pen-to-square mr-1"></i> Edit Data Profil</p>
                <div class="space-y-3 text-[11px]">
                    <div>
                        <label class="block text-gray-400 mb-1">URL Foto Profil Baru:</label>
                        <input type="url" id="edit-avatar-url" placeholder="https://domain.com/foto.jpg" class="w-full bg-[#1f2937]/50 border border-gray-800 rounded-xl px-3 py-2 text-white focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">Username Baru:</label>
                        <input type="text" id="edit-username" placeholder="Nama Baru..." class="w-full bg-[#1f2937]/50 border border-gray-800 rounded-xl px-3 py-2 text-white focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">Bio Singkat:</label>
                        <textarea id="edit-bio" rows="2" placeholder="Bio baru kamu..." class="w-full bg-[#1f2937]/50 border border-gray-800 rounded-xl px-3 py-2 text-white focus:outline-none focus:border-purple-500 resize-none"></textarea>
                    </div>
                    <div class="flex gap-2 pt-1">
                        <button onclick="saveProfileChanges()" id="btn-save-profile" class="flex-1 py-2 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 font-bold text-white rounded-xl shadow transition">Simpan</button>
                        <button onclick="toggleEditZone(false)" class="px-3 py-2 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-xl transition">Batal</button>
                    </div>
                </div>
            </div>

            <!-- Tombol Pemicu Tampilkan/Sembunyikan Form Edit -->
            <div id="edit-toggle-btn-wrapper" class="mt-2">
                <button onclick="toggleEditZone(true)" class="text-[11px] text-purple-400 hover:text-purple-300 font-semibold underline"><i class="fa-solid fa-user-gear mr-1"></i>Ubah Foto & Biodata</button>
            </div>

            <!-- Level & XP Status Bar -->
            <div class="mt-6 bg-[#1f2937]/40 border border-gray-800 p-4 rounded-2xl text-left space-y-3">
                <div class="flex justify-between text-[11px] font-bold">
                    <span class="text-gray-400"><i class="fa-solid fa-medal text-yellow-500 mr-1"></i> Level <span id="user-level" class="transition-all duration-300">1</span></span>
                    <span class="text-purple-400"><span id="user-xp">0</span> / 100 XP</span>
                </div>
                <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden">
                    <div id="user-xp-bar" class="bg-gradient-to-r from-purple-500 to-pink-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <!-- Action Button -->
            <button onclick="handleLogout()" class="w-full text-xs bg-gray-800/80 hover:bg-red-900/40 border border-gray-700/60 hover:border-red-500/40 py-3 rounded-xl font-bold text-gray-300 hover:text-red-400 transition duration-300 mt-6">
                <i class="fa-solid fa-power-off mr-1.5"></i> Keluar Akun
            </button>
        </div>

    </main>

    <script src="config.js"></script>
    <script>
        document.getElementById('dynamic-bg').style.backgroundImage = `url('${CONFIG.BG_URL}')`;
        
        const supabaseProfile = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        let isLoginMode = true;
        let loggedInUser = null;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'Selamat Datang Wokk!' : 'Buat Akun Baru';
            document.getElementById('auth-desc').innerText = isLoginMode ? 'Silakan masuk atau buat akun baru untuk akses streaming.' : 'Daftarkan email aktifmu untuk mulai kumpulkan XP.';
            document.getElementById('btn-primary').innerText = isLoginMode ? 'Masuk Sekarang' : 'Daftar Baru';
            document.getElementById('btn-toggle').innerText = isLoginMode ? 'Belum punya akun? Daftar Baru Disini' : 'Sudah punya akun? Masuk Disini';
        }

        function toggleEditZone(show) {
            if(show) {
                document.getElementById('edit-profile-zone').classList.remove('hidden');
                document.getElementById('edit-toggle-btn-wrapper').classList.add('hidden');
            } else {
                document.getElementById('edit-profile-zone').classList.add('hidden');
                document.getElementById('edit-toggle-btn-wrapper').classList.remove('hidden');
            }
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();

            if (!email || !password) {
                alert('Woi, email sama password jangan dikosongin!');
                return;
            }

            document.getElementById('btn-primary').innerText = 'Memproses...';
            document.getElementById('btn-primary').disabled = true;

            if (isLoginMode) {
                const { data, error } = await supabaseProfile.auth.signInWithPassword({ email, password });
                if (error) {
                    alert('Gagal Masuk: ' + error.message);
                    document.getElementById('btn-primary').innerText = 'Masuk Sekarang';
                    document.getElementById('btn-primary').disabled = false;
                } else {
                    checkUserSession();
                }
            } else {
                const { data, error } = await supabaseProfile.auth.signUp({ email, password });
                if (error) {
                    alert('Gagal Daftar: ' + error.message);
                    document.getElementById('btn-primary').innerText = 'Daftar Baru';
                    document.getElementById('btn-primary').disabled = false;
                } else {
                    alert('Pendaftaran Berhasil! Silakan langsung login dengan akun tersebut.');
                    isLoginMode = true;
                    toggleAuthMode();
                    document.getElementById('btn-primary').disabled = false;
                }
            }
        }

        async function checkUserSession() {
            document.getElementById('profile-loading').classList.remove('hidden');
            document.getElementById('auth-box').classList.add('hidden');
            document.getElementById('profile-box').classList.add('hidden');

            const { data: { user } } = await supabaseProfile.auth.getUser();

            document.getElementById('profile-loading').classList.add('hidden');

            if (user) {
                loggedInUser = user;
                const { data: profile, error } = await supabaseProfile
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .single();

                if (profile) {
                    document.getElementById('user-username').innerText = `@${profile.username || 'otaku'}`;
                    document.getElementById('user-avatar').src = profile.avatar_url || `https://api.dicebear.com/7.x/bottts/svg?seed=${user.id}`;
                    document.getElementById('user-bio').innerText = `"${profile.bio || 'Hai, aku seorang Otaku!'}"`;
                    document.getElementById('user-xp').innerText = profile.xp || 0;
                    
                    // Isi form edit dengan data saat ini
                    document.getElementById('edit-username').value = profile.username || '';
                    document.getElementById('edit-avatar-url').value = profile.avatar_url || '';
                    document.getElementById('edit-bio').value = profile.bio || '';
                    
                    const levelBadge = document.getElementById('user-level');
                    if (profile.level === 999999) {
                        levelBadge.innerText = "Unlimited ♾️";
                        levelBadge.className = "font-black text-transparent bg-clip-text bg-gradient-to-r from-red-400 via-pink-500 to-amber-400 animate-pulse";
                    } else {
                        levelBadge.innerText = profile.level || 1;
                        levelBadge.className = "font-bold text-white";
                    }
                    
                    const xpPercent = Math.min(profile.xp || 0, 100);
                    document.getElementById('user-xp-bar').style.width = `${xpPercent}%`;

                    const roleBadge = document.getElementById('user-role');
                    
                    if (profile.role === 'Owner') {
                        roleBadge.className = "text-[9px] font-black uppercase tracking-widest px-2.5 py-1 rounded-lg bg-red-950/80 text-red-400 border border-red-500/60 shadow-lg owner-glow flex items-center gap-1";
                        roleBadge.innerHTML = `<i class="fa-solid fa-crown text-amber-400 animate-bounce"></i> Owner`;
                    } else {
                        roleBadge.className = "text-[9px] font-black uppercase tracking-widest px-2.5 py-1 rounded-lg bg-gray-800 text-gray-400 border border-gray-700/60";
                        roleBadge.innerText = profile.role || 'User Biasa';
                    }

                    document.getElementById('profile-box').classList.remove('hidden');
                } else {
                    document.getElementById('user-username').innerText = user.email.split('@')[0];
                    document.getElementById('user-role').innerText = 'User Biasa';
                    document.getElementById('profile-box').classList.remove('hidden');
                }
            } else {
                document.getElementById('auth-box').classList.remove('hidden');
            }
        }

        async function saveProfileChanges() {
            if(!loggedInUser) return;
            
            const btnSave = document.getElementById('btn-save-profile');
            btnSave.disabled = true;
            btnSave.innerText = "Menyimpan...";

            const newUsername = document.getElementById('edit-username').value.trim();
            const newAvatar = document.getElementById('edit-avatar-url').value.trim();
            const newBio = document.getElementById('edit-bio').value.trim();

            const { error } = await supabaseProfile.from('profiles').upsert({
                id: loggedInUser.id,
                username: newUsername || loggedInUser.email.split('@')[0],
                avatar_url: newAvatar,
                bio: newBio,
                updated_at: new Date()
            });

            if(error) {
                alert("Gagal update data profil: " + error.message);
            } else {
                alert("Mantap wok, profil berhasil diperbarui!");
                toggleEditZone(false);
                checkUserSession();
            }
            btnSave.disabled = false;
            btnSave.innerText = "Simpan";
        }

        async function handleLogout() {
            if (confirm('Yakin ingin keluar dari akun KyuNimeID kamu, wok?')) {
                await supabaseProfile.auth.signOut();
                window.location.reload();
            }
        }

        checkUserSession();
    </script>
</body>
</html>
