<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - KyuAnime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: #0b0f19; 
            color: #e2e8f0; 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            transition: background 0.5s ease; 
        }
        
        .role-owner {
            background: linear-gradient(270deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: rgb-text 3s ease infinite; font-weight: 900;
        }
        @keyframes rgb-text { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* EFEK BLING-BLING NEBULA COSMIC UNTUK BREAKER */
        .role-breaker {
            background: linear-gradient(45deg, #a855f7, #ec4899, #6366f1, #06b6d4, #a855f7);
            background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: nebula-glow 3s ease infinite; font-weight: 900;
            filter: drop-shadow(0 0 5px rgba(168, 85, 247, 0.8)) drop-shadow(0 0 10px rgba(6, 182, 212, 0.5));
        }
        @keyframes nebula-glow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .glass-panel { 
            background: rgba(17, 24, 39, 0.7); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
    </style>
</head>
<body class="antialiased selection:bg-purple-500">

    <!-- Navbar -->
    <nav class="bg-[#0b0f19]/90 border-b border-gray-800 sticky top-0 z-50 px-4 py-3 backdrop-blur-md">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-purple-500 tracking-wider hover:scale-105 transition">
                Kyu<span class="text-white">Anime</span>
            </a>
            <button onclick="logout()" class="text-sm bg-red-600/90 hover:bg-red-500 px-4 py-2 rounded-xl font-bold transition shadow-lg shadow-red-500/20 text-white">
                <i class="fa-solid fa-power-off mr-2"></i>Logout
            </button>
        </div>
    </nav>

    <!-- Konten Utama -->
    <main class="max-w-5xl mx-auto px-4 py-10">
        
        <!-- Kartu Pratinjau Profil Utama -->
        <div class="glass-panel rounded-3xl p-8 shadow-2xl relative overflow-hidden mb-8">
            <!-- Banner Utama -->
            <div id="profile-banner" class="absolute top-0 left-0 w-full h-32 bg-gradient-to-r from-purple-900/50 via-gray-900 to-black z-0 border-b border-gray-800 bg-cover bg-center transition-all duration-300"></div>
            
            <div class="relative z-10 flex flex-col md:flex-row items-center md:items-end gap-6 mt-10">
                <div class="relative">
                    <img id="profile-img" src="https://via.placeholder.com/150" class="w-32 h-32 rounded-full border-4 border-[#0b0f19] object-cover bg-gray-800 shadow-xl transition">
                </div>

                <div class="text-center md:text-left flex-1 mb-2 w-full">
                    <!-- Baris Nama & ID -->
                    <div class="flex items-center justify-center md:justify-start gap-3">
                        <h1 id="profile-name" class="text-3xl font-black text-white">Memuat...</h1>
                        <span id="profile-id" class="bg-purple-900/50 border border-purple-500/30 px-2 py-1 rounded text-xs text-purple-300 font-mono font-bold shadow-inner">#--</span>
                    </div>
                    
                    <!-- Wadah Role dan Tombol Edit -->
                    <div class="mt-2 mb-4 flex flex-col items-center md:items-start gap-3">
                        <!-- Teks Role Akun -->
                        <p class="text-sm uppercase tracking-widest"><span id="profile-role"></span></p>

                        <!-- Tombol Edit Profil -->
                        <button onclick="openEditModal()" class="bg-gray-800/80 hover:bg-purple-600 border border-white/10 text-white text-xs font-bold px-4 py-2 rounded-xl transition shadow-lg flex items-center gap-2" title="Edit Kustom Profil">
                            <i class="fa-solid fa-pen-to-square"></i> Edit Profil
                        </button>
                    </div>
                    
                    <!-- Progress Bar Level -->
                    <div class="bg-black/50 p-4 rounded-2xl border border-white/5 max-w-md mx-auto md:mx-0 shadow-inner">
                        <div class="flex justify-between text-xs font-bold mb-2">
                            <span class="text-purple-400 uppercase tracking-widest" id="display-level">Level --</span>
                            <span class="text-green-400"><span id="display-exp">0</span> EXP</span>
                        </div>
                        <div class="w-full bg-gray-800 rounded-full h-2.5 overflow-hidden border border-white/5">
                            <div class="bg-gradient-to-r from-purple-500 to-indigo-500 h-full rounded-full w-full shadow-[0_0_10px_rgba(168,85,247,0.5)]"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Panel Grid Bawah (Teman & Statistik) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Sistem Pertemanan -->
            <div class="glass-panel rounded-3xl border border-gray-800 p-6 flex flex-col h-full">
                <h3 class="text-lg font-black text-white mb-4 flex items-center"><i class="fa-solid fa-user-group text-blue-500 mr-2"></i>Sistem Pertemanan</h3>
                
                <div class="flex gap-2 mb-6">
                    <input type="text" id="search-friend-id" placeholder="Masukkan ID (contoh: 12345)" class="flex-1 bg-black/50 text-sm text-white px-4 py-2.5 rounded-xl border border-gray-700/50 focus:outline-none focus:border-purple-500 transition shadow-inner">
                    <button onclick="searchFriend()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-5 py-2.5 rounded-xl transition shadow-lg"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>

                <div id="search-result" class="hidden bg-blue-900/20 border border-blue-500/30 p-4 rounded-2xl mb-6 transition"></div>

                <div class="w-full h-px bg-gray-800 mb-6"></div>

                <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Daftar Teman Kamu</h4>
                <div id="friends-list" class="space-y-3 flex-1 overflow-y-auto pr-2 max-h-60 custom-scrollbar">
                    <div class="text-center py-4"><div class="w-6 h-6 border-2 border-purple-500/30 border-t-purple-500 rounded-full animate-spin mx-auto"></div></div>
                </div>
            </div>

            <!-- Statistik Akun -->
            <div class="glass-panel rounded-3xl border border-gray-800 p-6">
                <h3 class="text-lg font-black text-white mb-4 flex items-center"><i class="fa-solid fa-gem text-green-500 mr-2"></i>Statistik Akun</h3>
                <ul class="text-sm text-gray-300 space-y-4" id="stat-list">
                    <li class="flex justify-between items-center bg-black/40 p-4 rounded-xl border border-white/5">
                        <span class="font-bold text-gray-400"><i class="fa-solid fa-calendar-days mr-2"></i>Bergabung Sejak</span>
                        <span id="stat-join" class="font-black text-white">-</span>
                    </li>
                    <li class="flex justify-between items-center bg-black/40 p-4 rounded-xl border border-white/5">
                        <span class="font-bold text-gray-400"><i class="fa-solid fa-shield-halved mr-2"></i>Status Akun</span>
                        <span class="font-black text-green-400 tracking-widest uppercase">Aktif</span>
                    </li>
                    <li class="flex justify-between items-center bg-black/40 p-4 rounded-xl border border-white/5">
                        <span class="font-bold text-gray-400"><i class="fa-solid fa-film mr-2"></i>Anime Ditonton</span>
                        <span class="font-black text-purple-400">Dalam Pengembangan</span>
                    </li>
                </ul>
            </div>

        </div>
    </main>

    <!-- MODAL EDIT CUSTOM PROFIL (UPLOAD GAMBAR) -->
    <div id="edit-profile-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[100] hidden backdrop-blur-md px-4 transition-opacity">
        <div class="glass-panel rounded-3xl w-full max-w-md overflow-hidden shadow-2xl border border-white/10 bg-[#0b0f19] p-6">
            <h3 class="text-xl font-black text-white mb-4 flex items-center gap-2">
                <i class="fa-solid fa-user-gear text-purple-500"></i> Kustomisasi Profil
            </h3>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 tracking-wider mb-1">Nama Tampilan</label>
                    <input type="text" id="edit-name" class="w-full bg-black/60 text-sm text-white px-4 py-2.5 rounded-xl border border-gray-700 focus:outline-none focus:border-purple-500 font-bold transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 tracking-wider mb-1">Foto Profil (Avatar)</label>
                    <input type="file" id="edit-avatar-file" accept="image/*" class="w-full bg-black/60 text-xs text-white px-4 py-2.5 rounded-xl border border-gray-700 focus:outline-none focus:border-purple-500 transition file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-purple-600 file:text-white hover:file:bg-purple-500 cursor-pointer">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 tracking-wider mb-1">Banner Atas</label>
                    <input type="file" id="edit-banner-file" accept="image/*" class="w-full bg-black/60 text-xs text-white px-4 py-2.5 rounded-xl border border-gray-700 focus:outline-none focus:border-purple-500 transition file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-purple-600 file:text-white hover:file:bg-purple-500 cursor-pointer">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 tracking-wider mb-1">Background Wallpaper</label>
                    <input type="file" id="edit-background-file" accept="image/*" class="w-full bg-black/60 text-xs text-white px-4 py-2.5 rounded-xl border border-gray-700 focus:outline-none focus:border-purple-500 transition file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-purple-600 file:text-white hover:file:bg-purple-500 cursor-pointer">
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="closeEditModal()" class="w-1/2 py-2.5 bg-gray-800 hover:bg-gray-700 text-gray-300 font-bold rounded-xl transition text-sm">Batal</button>
                <button onclick="saveProfileChanges()" id="btn-save-profile" class="w-1/2 py-2.5 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-xl transition text-sm shadow-lg shadow-purple-600/20">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Coba muat config.js, jika gagal atau tidak ada, script tidak akan error -->
    <script>
        window.CONFIG = window.CONFIG || {
            SUPABASE_URL: "URL_SUPABASE_KAMU", 
            SUPABASE_ANON_KEY: "KEY_SUPABASE_KAMU",
            DEFAULT_BACKGROUND: ""
        };
    </script>
    <script src="config.js" onerror="console.warn('config.js tidak ditemukan, menggunakan konfigurasi fallback.')"></script>
    
    <script>
        const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let currentUser = null;
        let selectedUserId = null;

        async function loadProfile() {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            if (error || !session) return window.location.href = 'auth.html';

            currentUser = session.user;
            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();

            if (profile) {
                document.getElementById('profile-name').innerText = profile.full_name || 'Tanpa Nama';
                document.getElementById('profile-id').innerText = `#${profile.user_id || '000000'}`;
                document.getElementById('profile-img').src = profile.avatar_url || 'https://via.placeholder.com/150';
                document.getElementById('display-level').innerText = `Level ${profile.level || 0}`;
                document.getElementById('display-exp').innerText = profile.exp || 0;
                
                // --- PENGATURAN BACKGROUND ---
                if (profile.background_url && profile.background_url.trim() !== "") {
                    document.body.style.backgroundImage = `url('${profile.background_url.trim()}')`;
                    document.body.style.backgroundSize = "cover";
                    document.body.style.backgroundPosition = "center";
                } else if (CONFIG.DEFAULT_BACKGROUND && CONFIG.DEFAULT_BACKGROUND.trim() !== "") {
                    document.body.style.backgroundImage = `url('${CONFIG.DEFAULT_BACKGROUND}')`;
                    document.body.style.backgroundSize = "cover";
                    document.body.style.backgroundPosition = "center";
                } else {
                    document.body.style.backgroundImage = 'none';
                }

                // --- PENGATURAN BANNER KUSTOM ---
                const bannerEl = document.getElementById('profile-banner');
                if (profile.banner_url && profile.banner_url.trim() !== "") {
                    bannerEl.classList.remove('bg-gradient-to-r', 'from-purple-900/50', 'via-gray-900', 'to-black');
                    bannerEl.style.backgroundImage = `url('${profile.banner_url.trim()}')`;
                } else {
                    bannerEl.style.backgroundImage = 'none';
                    bannerEl.classList.add('bg-gradient-to-r', 'from-purple-900/50', 'via-gray-900', 'to-black');
                }

                const date = new Date(profile.created_at);
                document.getElementById('stat-join').innerText = date.toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });

                const roleSpan = document.getElementById('profile-role');
                if (profile.role === 'owner') {
                    roleSpan.innerText = '👑 Owner';
                    roleSpan.className = 'role-owner';
                } else if (profile.role === 'breaker') {
                    roleSpan.innerText = '🔥 Breaker';
                    roleSpan.className = 'role-breaker';
                } else {
                    roleSpan.innerText = 'Member';
                    roleSpan.className = 'text-blue-400 font-bold';
                }

                loadFriends();
            }
        }

        // Buka Modal Edit
        async function openEditModal() {
            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
            if (profile) {
                document.getElementById('edit-name').value = profile.full_name || '';
                // Kosongkan input file agar siap menerima file baru
                document.getElementById('edit-avatar-file').value = '';
                document.getElementById('edit-banner-file').value = '';
                document.getElementById('edit-background-file').value = '';
                document.getElementById('edit-profile-modal').classList.remove('hidden');
            }
        }

        function closeEditModal() {
            document.getElementById('edit-profile-modal').classList.add('hidden');
        }

        // Fungsi bantuan untuk upload file ke Supabase Storage
        async function uploadImageToSupabase(file, folderName) {
            // Buat nama file unik agar tidak bertabrakan
            const fileExt = file.name.split('.').pop();
            const fileName = `${currentUser.id}-${Date.now()}.${fileExt}`;
            const filePath = `${folderName}/${fileName}`;

            // Proses Upload ke bucket 'user_content'
            const { error: uploadError } = await supabaseClient.storage
                .from('user_content') 
                .upload(filePath, file, { upsert: true });

            if (uploadError) {
                console.error("Gagal upload gambar:", uploadError);
                return null;
            }

            // Ambil URL Publik
            const { data } = supabaseClient.storage.from('user_content').getPublicUrl(filePath);
            return data.publicUrl;
        }

        // Menyimpan perubahan profil & Mengunggah Gambar jika ada
        async function saveProfileChanges() {
            const btnSave = document.getElementById('btn-save-profile');
            btnSave.innerText = 'Mengunggah & Menyimpan...';
            btnSave.disabled = true;

            const nameInput = document.getElementById('edit-name').value.trim();
            const avatarFile = document.getElementById('edit-avatar-file').files[0];
            const bannerFile = document.getElementById('edit-banner-file').files[0];
            const backgroundFile = document.getElementById('edit-background-file').files[0];

            if(!nameInput) {
                alert("Nama tidak boleh kosong!");
                btnSave.innerText = 'Simpan';
                btnSave.disabled = false;
                return;
            }

            // Siapkan objek data yang akan diupdate ke database
            let updateData = { full_name: nameInput };

            // Jika user memilih file avatar baru
            if (avatarFile) {
                const url = await uploadImageToSupabase(avatarFile, 'avatars');
                if (url) updateData.avatar_url = url;
            }

            // Jika user memilih file banner baru
            if (bannerFile) {
                const url = await uploadImageToSupabase(bannerFile, 'banners');
                if (url) updateData.banner_url = url;
            }

            // Jika user memilih file background baru
            if (backgroundFile) {
                const url = await uploadImageToSupabase(backgroundFile, 'backgrounds');
                if (url) updateData.background_url = url;
            }

            // Update database dengan data baru
            const { error } = await supabaseClient
                .from('profiles')
                .update(updateData)
                .eq('id', currentUser.id);

            btnSave.innerText = 'Simpan';
            btnSave.disabled = false;

            if(error) {
                alert("Gagal memperbarui profil: " + error.message);
            } else {
                alert("Profil berhasil diperbarui!");
                closeEditModal();
                loadProfile(); // Refresh tampilan seketika
            }
        }

        // FUNGSI PENCARIAN TEMAN
        async function searchFriend() {
            const searchId = document.getElementById('search-friend-id').value.trim();
            const resultBox = document.getElementById('search-result');
            
            if(!searchId) return;

            resultBox.classList.remove('hidden');
            resultBox.innerHTML = '<p class="text-sm text-gray-400 animate-pulse">Mencari...</p>';

            const { data, error } = await supabaseClient.from('profiles').select('*').eq('user_id', searchId).single();

            if (error || !data) {
                resultBox.innerHTML = '<p class="text-sm font-bold text-red-400"><i class="fa-solid fa-triangle-exclamation mr-2"></i>User tidak ditemukan.</p>';
                return;
            }

            if (data.id === currentUser.id) {
                resultBox.innerHTML = '<p class="text-sm font-bold text-yellow-400"><i class="fa-solid fa-face-smile-wink mr-2"></i>Itu ID kamu sendiri!</p>';
                return;
            }

            resultBox.innerHTML = `
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <img src="${data.avatar_url || 'https://via.placeholder.com/150'}" class="w-10 h-10 rounded-full border border-blue-500 object-cover">
                        <div>
                            <p class="text-sm font-bold text-white">${data.full_name}</p>
                            <p class="text-[10px] text-gray-400 uppercase tracking-widest">Lv.${data.level || 0}</p>
                        </div>
                    </div>
                    <button onclick="sendFriendRequest('${data.id}')" class="bg-purple-600 hover:bg-purple-500 text-white text-xs font-bold px-3 py-2 rounded-lg transition">Tambah</button>
                </div>
            `;
        }

        // FUNGSI KIRIM REQUEST TEMAN
        async function sendFriendRequest(targetId) {
            const { error } = await supabaseClient.from('friends').insert({
                requester_id: currentUser.id,
                receiver_id: targetId,
                status: 'pending'
            });

            if(error) {
                alert("Kamu sudah mengirim request ke user ini atau kalian sudah berteman.");
            } else {
                alert("Permintaan pertemanan berhasil dikirim!");
                document.getElementById('search-result').classList.add('hidden');
                document.getElementById('search-friend-id').value = '';
            }
        }

        // MEMUAT DAFTAR TEMAN
        async function loadFriends() {
            const { data, error } = await supabaseClient
                .from('friends')
                .select(`
                    id, status, requester_id, receiver_id,
                    requester:profiles!friends_requester_id_fkey(id, full_name, user_id, avatar_url, banner_url, background_url, level, exp, role),
                    receiver:profiles!friends_receiver_id_fkey(id, full_name, user_id, avatar_url, banner_url, background_url, level, exp, role)
                `)
                .or(`requester_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`);

            const listEl = document.getElementById('friends-list');
            
            if(!data || data.length === 0) {
                listEl.innerHTML = '<div class="bg-black/40 p-4 rounded-xl text-center border border-white/5"><p class="text-gray-500 text-sm">Belum ada teman. Cari ID temanmu di atas!</p></div>';
                updateTotalTeman(0);
                return;
            }

            const totalAccepted = data.filter(f => f.status === 'accepted').length;
            updateTotalTeman(totalAccepted);

            listEl.innerHTML = data.map(f => {
                const isRequester = f.requester_id === currentUser.id;
                const friendData = isRequester ? f.receiver : f.requester;
                
                if (!friendData) return '';

                const friendName = friendData.full_name || 'User Tidak Diketahui';
                const targetUUID = friendData.id;

                let actionArea = '';
                if (f.status === 'accepted') {
                    actionArea = `
                        <div class="flex items-center gap-2">
                            <span class="bg-green-500/20 text-green-400 px-2 py-1 rounded text-[10px] font-black uppercase tracking-wider border border-green-500/30"><i class="fa-solid fa-check mr-1"></i>Teman</span>
                            <button onclick="openProfileModal('${targetUUID}')" class="bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs font-bold px-2.5 py-1 rounded-lg transition" title="Lihat Profil"><i class="fa-solid fa-eye"></i></button>
                        </div>
                    `;
                } else {
                    actionArea = isRequester 
                        ? '<span class="text-yellow-400 text-xs font-bold bg-yellow-400/10 px-2 py-1 rounded border border-yellow-400/20">Menunggu...</span>' 
                        : `<div class="flex items-center gap-2">
                            <button onclick="acceptFriendRequest('${f.id}')" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-3 py-1 rounded-lg transition shadow-lg">Terima</button>
                            <button onclick="openProfileModal('${targetUUID}')" class="bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs font-bold px-2.5 py-1 rounded-lg transition"><i class="fa-solid fa-eye"></i></button>
                           </div>`;
                }
                
                return `
                <div class="flex items-center justify-between bg-black/40 p-3 rounded-xl border border-white/5 transition hover:border-white/20">
                    <span class="text-sm font-bold text-white flex items-center cursor-pointer hover:text-purple-400 transition" onclick="openProfileModal('${targetUUID}')">
                        <img src="${friendData.avatar_url || 'https://via.placeholder.com/150'}" class="w-8 h-8 rounded-full object-cover mr-3 border border-white/10">
                        ${friendName}
                    </span>
                    ${actionArea}
                </div>`;
            }).join('');
        }

        // UPDATE TOTAL TEMAN DI STATISTIK AKUN
        function updateTotalTeman(total) {
            let totalTemanEl = document.getElementById('stat-total-teman');
            if (!totalTemanEl) {
                const statList = document.getElementById('stat-list');
                const li = document.createElement('li');
                li.className = "flex justify-between items-center bg-black/40 p-4 rounded-xl border border-white/5";
                li.innerHTML = `
                    <span class="font-bold text-gray-400"><i class="fa-solid fa-user-friends mr-2"></i>Total Teman</span>
                    <span id="stat-total-teman" class="font-black text-blue-400 text-base">${total}</span>
                `;
                statList.appendChild(li);
            } else {
                totalTemanEl.innerText = total;
            }
        }

        // FUNGSI TERIMA REQUEST TEMAN
        async function acceptFriendRequest(requestId) {
            const { error } = await supabaseClient
                .from('friends')
                .update({ status: 'accepted' })
                .eq('id', requestId);

            if (error) {
                alert("Gagal menerima pertemanan: " + error.message);
            } else {
                loadFriends(); 
            }
        }

        // MODAL PROFIL PUBLIK
        async function openProfileModal(userId) {
            selectedUserId = userId;
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', userId).single();
            if(!data) return;

            let modal = document.getElementById('public-profile-modal');
            if(!modal) {
                const modalContainer = document.createElement('div');
                modalContainer.id = 'public-profile-modal';
                modalContainer.className = 'fixed inset-0 bg-black/90 flex items-center justify-center z-[100] hidden backdrop-blur-md px-4 transition-opacity';
                modalContainer.innerHTML = `
                    <div class="glass-panel rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl relative border border-white/10 bg-[#0b0f19]">
                        <div id="modal-banner" class="h-24 bg-cover bg-center opacity-80"></div>
                        <div class="px-6 pb-8 relative -mt-12 text-center">
                            <img id="modal-avatar" src="" class="w-24 h-24 rounded-full border-4 border-[#0b0f19] mx-auto object-cover bg-gray-900 mb-3 shadow-xl">
                            <h3 id="modal-name" class="text-xl font-black text-white"></h3>
                            <p class="text-xs text-gray-400 mb-1 font-mono">ID: <span id="modal-id"></span></p>
                            <p class="text-xs font-bold mb-5 uppercase tracking-widest" id="modal-role"></p>
                            <div class="flex justify-center gap-3 mb-6">
                                <div class="bg-black/50 px-4 py-3 rounded-xl border border-white/10 w-1/2">
                                    <span class="block text-[10px] text-gray-400 uppercase tracking-wider mb-1">Level</span>
                                    <span id="modal-level" class="text-xl font-black text-purple-400"></span>
                                </div>
                                <div class="bg-black/50 px-4 py-3 rounded-xl border border-white/10 w-1/2">
                                    <span class="block text-[10px] text-gray-400 uppercase tracking-wider mb-1">Total EXP</span>
                                    <span id="modal-exp" class="text-xl font-black text-green-400"></span>
                                </div>
                            </div>
                            <button onclick="closeModal()" class="w-full py-2.5 bg-gray-800 hover:bg-red-500 text-white font-bold rounded-xl transition text-sm">Tutup Profil</button>
                        </div>
                    </div>`;
                document.body.appendChild(modalContainer);
                modal = document.getElementById('public-profile-modal');
            }

            const modalBanner = document.getElementById('modal-banner');
            if (data.banner_url && data.banner_url.trim() !== "") {
                modalBanner.style.backgroundImage = `url('${data.banner_url.trim()}')`;
                modalBanner.className = "h-24 bg-cover bg-center opacity-80";
            } else {
                modalBanner.style.backgroundImage = 'none';
                modalBanner.className = "h-24 bg-gradient-to-r from-purple-800 to-blue-900 opacity-80 bg-cover bg-center";
            }

            document.getElementById('modal-avatar').src = data.avatar_url || 'https://via.placeholder.com/150';
            document.getElementById('modal-name').innerText = data.full_name || 'Tanpa Nama';
            document.getElementById('modal-id').innerText = `#${data.user_id || '000000'}`;
            document.getElementById('modal-level').innerText = data.level || 0;
            document.getElementById('modal-exp').innerText = data.exp || 0;
            
            const roleEl = document.getElementById('modal-role');
            if (data.role === 'owner') {
                roleEl.innerText = '👑 Owner';
                roleEl.className = 'text-[11px] font-black mb-5 uppercase tracking-widest role-owner';
            } else if (data.role === 'breaker') {
                roleEl.innerText = '🔥 Breaker';
                roleEl.className = 'text-[11px] font-black mb-5 uppercase tracking-widest role-breaker';
            } else {
                roleEl.innerText = 'Wibu Member';
                roleEl.className = 'text-[11px] font-black mb-5 uppercase tracking-widest text-blue-400';
            }

            modal.classList.remove('hidden');
        }

        function closeModal() { 
            document.getElementById('public-profile-modal').classList.add('hidden'); 
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'auth.html';
        }

        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
