<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Otaku - KyuAnime</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-[#0b0f19]/80 backdrop-blur-md text-gray-200 font-sans; }
        
        /* Efek Berkilau Goresan RGB Merah khusus Owner */
        .title-owner {
            background: linear-gradient(90deg, #ff0000, #990000, #ff4d4d, #ff0000);
            background-size: 300% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: shineRGB 3s linear infinite;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }
        @keyframes shineRGB {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-200 min-h-screen">

    <nav class="bg-[#111827]/90 border-b border-gray-800 px-4 py-3 mb-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-purple-500 tracking-wider">Kyu<span class="text-white">Anime</span></a>
            <a href="index.html" class="text-sm text-gray-400 hover:text-white"><i class="fa-solid fa-house mr-1"></i> Beranda</a>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4">
        <!-- FORM AUTH (LOG IN / SIGN UP) -->
        <div id="auth-box" class="bg-[#111827]/80 p-6 rounded-2xl border border-gray-800 shadow-2xl hidden">
            <h2 id="auth-title" class="text-xl font-black text-center text-white mb-6">Masuk Ke KyuAnime</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Email</label>
                    <input type="email" id="auth-email" class="w-full bg-[#1f2937] border border-gray-700 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Password</label>
                    <input type="password" id="auth-password" class="w-full bg-[#1f2937] border border-gray-700 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-purple-500">
                </div>
                <button onclick="handleAuth()" id="btn-auth-submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold py-2.5 rounded-xl transition shadow-lg mt-2">Masuk</button>
                <p class="text-xs text-center text-gray-500 mt-4">
                    <span id="auth-switch-text">Belum punya akun?</span> 
                    <button onclick="toggleAuthMode()" id="auth-switch-btn" class="text-purple-400 font-bold hover:underline">Daftar Sekarang</button>
                </p>
            </div>
        </div>

        <!-- DASHBOARD PROFIL USER -->
        <div id="profile-box" class="bg-[#111827]/80 p-6 rounded-2xl border border-gray-800 shadow-2xl space-y-6 hidden">
            <!-- Tampilan Kartu Pengguna -->
            <div class="text-center relative">
                <div class="relative w-24 h-24 mx-auto mb-3 group">
                    <img id="user-avatar" src="https://api.dicebear.com/7.x/bottts/svg" class="w-full h-full rounded-full border-2 border-purple-500 object-cover shadow-md" alt="PP">
                    <label class="absolute inset-0 bg-black/60 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition cursor-pointer text-xs font-bold text-white">
                        <input type="file" id="avatar-input" accept="image/*" class="hidden" onchange="uploadAvatar()">
                        Ganti PP
                    </label>
                </div>
                <h2 id="user-name" class="text-xl font-black text-white">Loading...</h2>
                <div id="user-role" class="text-xs font-bold mt-1">User Biasa</div>
            </div>

            <!-- Sistem Level & XP -->
            <div class="bg-[#1f2937]/50 border border-gray-800 rounded-xl p-4">
                <div class="flex justify-between items-center mb-1.5">
                    <span class="text-xs font-bold text-purple-400 uppercase tracking-wide">Level <span id="user-level">1</span></span>
                    <span class="text-[11px] text-gray-400" id="user-xp-text">0 / 100 XP</span>
                </div>
                <div class="w-full bg-gray-800 rounded-full h-2">
                    <div id="user-xp-bar" class="bg-purple-500 h-2 rounded-full transition-all duration-500" style="w-0%"></div>
                </div>
                <p class="text-[10px] text-gray-500 mt-2 text-center">*Tonton anime secara rutin untuk menaikkan level kamu!</p>
            </div>

            <!-- Form Edit Data -->
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Nama Pengguna (Username)</label>
                    <input type="text" id="edit-username" class="w-full bg-[#1f2937] border border-gray-700 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Bio Kreatif</label>
                    <textarea id="edit-bio" rows="2" class="w-full bg-[#1f2937] border border-gray-700 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-purple-500 resize-none"></textarea>
                </div>
                <button onclick="updateProfile()" class="w-full bg-green-600 hover:bg-green-700 text-white text-sm font-bold py-2.5 rounded-xl transition shadow-md">Simpan Perubahan</button>
                <button onclick="handleLogout()" class="w-full bg-gray-800 hover:bg-red-900/40 border border-gray-700 text-gray-400 hover:text-red-400 text-xs py-2 rounded-xl transition">Keluar Akun (Log Out)</button>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script>
        // Inisialisasi Supabase Client
        const supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let isSignUpMode = false;
        let currentUser = null;

        // Cek Sesi Login Saat Halaman Dibuka
        async function checkSession() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                currentUser = user;
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('profile-box').classList.remove('hidden');
                loadUserProfile(user.id);
            } else {
                document.getElementById('profile-box').classList.add('hidden');
                document.getElementById('auth-box').classList.remove('hidden');
            }
        }

        // Ambil Data Profil dari Database
        async function loadUserProfile(userId) {
            const { data, error } = await supabase.from('profiles').select('*').eq('id', userId).single();
            if (data) {
                document.getElementById('user-name').innerText = data.username || 'Otaku';
                document.getElementById('edit-username').value = data.username || '';
                document.getElementById('edit-bio').value = data.bio || '';
                document.getElementById('user-avatar').src = data.avatar_url;
                
                // Set Level & Progress Bar XP (Rumus kelipatan 100 per level)
                const nextXp = data.level * 100;
                document.getElementById('user-level').innerText = data.level;
                document.getElementById('user-xp-text').innerText = `${data.xp} / ${nextXp} XP`;
                document.getElementById('user-xp-bar').style.width = `${(data.xp / nextXp) * 100}%`;

                // Atur Tampilan Badge Title Role (User Biasa, Admin, Owner)
                const roleEl = document.getElementById('user-role');
                roleEl.className = "text-xs font-bold mt-1 inline-block px-3 py-0.5 rounded";
                if(data.role === 'Owner') {
                    roleEl.innerText = "👑 Owner";
                    roleEl.className += " title-owner";
                } else if(data.role === 'Admin') {
                    roleEl.innerText = "🛡️ Admin";
                    roleEl.classList.add('bg-blue-600/20', 'text-blue-400', 'border', 'border-blue-500/30');
                } else {
                    roleEl.innerText = "👤 User Biasa";
                    roleEl.classList.add('bg-gray-800', 'text-gray-400');
                }
            }
        }

        // Aksi Simpan Update Nama & Bio
        async function updateProfile() {
            const username = document.getElementById('edit-username').value;
            const bio = document.getElementById('edit-bio').value;

            const { error } = await supabase.from('profiles').update({ username, bio, updated_at: new Date() }).eq('id', currentUser.id);
            if(!error) { alert('Profil berhasil diperbarui!'); loadUserProfile(currentUser.id); } 
            else { alert('Gagal update data/Username sudah dipakai.'); }
        }

        // Aksi Ganti Foto Profil & Upload ke Supabase Storage
        async function uploadAvatar() {
            const fileInput = document.getElementById('avatar-input');
            if (fileInput.files.length === 0) return;
            
            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop();
            const filePath = `${currentUser.id}/${Math.random()}.${fileExt}`;

            // Upload ke Bucket 'avatars'
            let { error: uploadError } = await supabase.storage.from('avatars').upload(filePath, file, { cacheControl: '3600', upsert: true });
            if (uploadError) return alert('Gagal upload gambar.');

            // Ambil URL Publiknya
            const { data } = supabase.storage.from('avatars').getPublicUrl(filePath);
            
            // Simpan URL tersebut ke Tabel Profil User
            await supabase.from('profiles').update({ avatar_url: data.publicUrl }).eq('id', currentUser.id);
            loadUserProfile(currentUser.id);
        }

        // Proses Tombol Login / Daftar
        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            if(isSignUpMode) {
                const { error } = await supabase.auth.signUp({ email, password });
                if(!error) alert('Pendaftaran sukses! Silakan masuk.');
                else alert(error.message);
            } else {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if(!error) checkSession();
                else alert(error.message);
            }
        }

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-title').innerText = isSignUpMode ? "Daftar Akun Otaku" : "Masuk Ke KyuAnime";
            document.getElementById('btn-auth-submit').innerText = isSignUpMode ? "Daftar Baru" : "Masuk";
            document.getElementById('auth-switch-text').innerText = isSignUpMode ? "Sudah punya akun?" : "Belum punya akun?";
            document.getElementById('auth-switch-btn').innerText = isSignUpMode ? "Masuk Saja" : "Daftar Sekarang";
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            window.location.reload();
        }

        checkSession();
    </script>
</body>
</html>
