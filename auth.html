<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Daftar - KyuAnime</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0b0f19] text-gray-200 flex items-center justify-center min-h-screen p-4">

    <div class="bg-[#111827]/80 backdrop-blur-md p-8 rounded-2xl border border-gray-800 w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <a href="index.html" class="text-3xl font-black text-purple-500 tracking-wider">Kyu<span class="text-white">Anime</span></a>
            <p class="text-sm text-gray-400 mt-2" id="form-subtitle">Masuk untuk menyimpan anime favoritmu!</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Email</label>
                <input type="email" id="email" required class="w-full bg-[#1f2937]/80 text-white px-4 py-2 rounded-lg border border-gray-700 focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                <input type="password" id="password" required class="w-full bg-[#1f2937]/80 text-white px-4 py-2 rounded-lg border border-gray-700 focus:outline-none focus:border-purple-500">
            </div>
            <button type="submit" id="submit-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded-lg transition">Login</button>
        </form>

        <p id="msg-box" class="text-center text-sm font-bold mt-4 hidden"></p>

        <div class="mt-6 text-center text-sm text-gray-400">
            <span id="toggle-text">Belum punya akun?</span> 
            <button id="toggle-btn" class="text-purple-400 hover:text-purple-300 font-bold ml-1">Daftar Sekarang</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const supabaseUrl = CONFIG.SUPABASE_URL;
        const supabaseKey = CONFIG.SUPABASE_ANON_KEY;
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let isLogin = true;
        const form = document.getElementById('auth-form');
        const toggleBtn = document.getElementById('toggle-btn');
        const submitBtn = document.getElementById('submit-btn');
        const subtitle = document.getElementById('form-subtitle');
        const msgBox = document.getElementById('msg-box');

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            submitBtn.innerText = isLogin ? 'Login' : 'Daftar';
            document.getElementById('toggle-text').innerText = isLogin ? 'Belum punya akun?' : 'Sudah punya akun?';
            toggleBtn.innerText = isLogin ? 'Daftar Sekarang' : 'Login Disini';
            subtitle.innerText = isLogin ? 'Masuk untuk menyimpan anime favoritmu!' : 'Bergabunglah dengan komunitas wibu terbesar.';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            submitBtn.innerText = 'Memproses...';
            submitBtn.disabled = true;

            let error = null;
            if (isLogin) {
                const { error: signInError } = await supabase.auth.signInWithPassword({ email, password });
                error = signInError;
            } else {
                const { error: signUpError } = await supabase.auth.signUp({ email, password });
                error = signUpError;
            }

            if (error) {
                msgBox.innerText = error.message;
                msgBox.className = 'text-center text-sm font-bold mt-4 text-red-500 block';
            } else {
                msgBox.innerText = isLogin ? 'Login Berhasil! Mengalihkan...' : 'Pendaftaran berhasil! Silakan Login.';
                msgBox.className = 'text-center text-sm font-bold mt-4 text-green-500 block';
                if(isLogin) setTimeout(() => window.location.href = 'index.html', 1500);
            }
            submitBtn.innerText = isLogin ? 'Login' : 'Daftar';
            submitBtn.disabled = false;
        });
    </script>
</body>
</html>
