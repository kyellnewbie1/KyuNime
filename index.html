<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KyuAnime - Streaming & Download Anime Sub Indo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; font-family: sans-serif; }
        .anime-card:hover img { transform: scale(1.05); }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="bg-[#111827]/90 backdrop-blur-md border-b border-gray-800 sticky top-0 z-50 px-4 py-3">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <a href="index.html" class="text-2xl font-black text-purple-500 tracking-wider">Kyu<span class="text-white">Anime</span></a>
            <div class="relative w-full sm:w-80">
                <input type="text" id="search-input" placeholder="Cari anime favoritmu..." class="w-full bg-[#1f2937]/80 text-sm text-white pl-4 pr-10 py-2 rounded-full border border-gray-700 focus:outline-none focus:border-purple-500">
                <button id="search-btn" class="absolute right-3 top-2.5 text-gray-400 hover:text-purple-500">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        
        <!-- Schedule Days -->
        <section class="mb-8 bg-[#111827]/60 p-4 rounded-xl border border-gray-800/80 backdrop-blur-sm">
            <h2 class="text-sm font-bold uppercase tracking-wider mb-3 text-purple-400"><i class="fa-solid fa-calendar-days mr-2"></i>Jadwal Rilis Anime</h2>
            <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-none text-sm">
                <button onclick="loadSchedule('monday')" class="px-4 py-2 bg-[#1f2937] rounded-lg hover:bg-purple-600 transition text-white">Senin</button>
                <button onclick="loadSchedule('tuesday')" class="px-4 py-2 bg-[#1f2937] rounded-lg hover:bg-purple-600 transition text-white">Selasa</button>
                <button onclick="loadSchedule('wednesday')" class="px-4 py-2 bg-[#1f2937] rounded-lg hover:bg-purple-600 transition text-white">Rabu</button>
                <button onclick="loadSchedule('thursday')" class="px-4 py-2 bg-[#1f2937] rounded-lg hover:bg-purple-600 transition text-white">Kamis</button>
                <button onclick="loadSchedule('friday')" class="px-4 py-2 bg-[#1f2937] rounded-lg hover:bg-purple-600 transition text-white">Jumat</button>
                <button onclick="loadSchedule('saturday')" class="px-4 py-2 bg-[#1f2937] rounded-lg hover:bg-purple-600 transition text-white">Sabtu</button>
                <button onclick="loadSchedule('sunday')" class="px-4 py-2 bg-[#1f2937] rounded-lg hover:bg-purple-600 transition text-white">Minggu</button>
            </div>
        </section>

        <h2 id="section-title" class="text-xl font-extrabold mb-6 border-l-4 border-purple-500 pl-3">Anime Terbaru</h2>
        
        <div id="loading" class="flex justify-center items-center py-20 hidden">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-purple-500"></div>
        </div>

        <div id="anime-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>

        <!-- Pagination -->
        <div id="pagination" class="flex justify-center gap-4 mt-10">
            <button id="prev-page" class="px-5 py-2 bg-[#111827] border border-gray-800 rounded-lg hover:bg-purple-600 transition">Prev</button>
            <span id="page-num" class="self-center font-bold text-purple-400 bg-[#111827] px-4 py-2 border border-gray-800 rounded-lg">Page 1</span>
            <button id="next-page" class="px-5 py-2 bg-[#111827] border border-gray-800 rounded-lg hover:bg-purple-600 transition">Next</button>
        </div>
    </main>

    <script src="config.js"></script>
    <script>
        let currentPage = 1;
        const container = document.getElementById('anime-container');
        const loading = document.getElementById('loading');
        const sectionTitle = document.getElementById('section-title');
        const pagination = document.getElementById('pagination');

        async function apiRequest(endpoint) {
            loading.classList.remove('hidden');
            container.innerHTML = '';
            try {
                const res = await fetch(`${CONFIG.API_BASE}${endpoint}`);
                const data = await res.json();
                loading.classList.add('hidden');
                return data.status ? data.result : null;
            } catch (err) {
                console.error(err);
                loading.classList.add('hidden');
                container.innerHTML = `<p class="text-red-500 col-span-full text-center py-10">Gagal mengambil data server.</p>`;
                return null;
            }
        }

        async function loadTerbaru(page = 1) {
            pagination.classList.remove('hidden');
            sectionTitle.innerText = "Anime Terbaru";
            const res = await apiRequest(`/terbaru.php?page=${page}`);
            if(res && res.anime_list) renderCards(res.anime_list, 'terbaru');
        }

        async function loadSchedule(day) {
            pagination.classList.add('hidden');
            sectionTitle.innerText = `Jadwal Rilis: ${day.toUpperCase()}`;
            const res = await apiRequest(`/schedule.php?day=${day}`);
            if(res && res.raw_data) renderCards(res.raw_data, 'schedule');
        }

        async function searchAnime(query) {
            pagination.classList.add('hidden');
            sectionTitle.innerText = `Hasil Pencarian: "${query}"`;
            const res = await apiRequest(`/search.php?q=${encodeURIComponent(query)}`);
            if(res && res.results) renderCards(res.results, 'search');
        }

        function renderCards(items, type) {
            if(!items || items.length === 0) {
                container.innerHTML = `<p class="text-gray-400 col-span-full text-center py-10">Tidak ada anime yang ditemukan.</p>`;
                return;
            }
            container.innerHTML = items.map(anime => {
                const title = anime.title;
                const img = anime.image || anime.featured_img_src;
                const targetUrl = anime.url;

                // Jika diklik di menu Terbaru, ia berupa link episode langsung, arahkan ke watch.html
                // Jika dari search / schedule, ia berupa link info anime, arahkan ke detail.html
                const href = (type === 'terbaru') ? `watch.html?episodeUrl=${encodeURIComponent(targetUrl)}` : `detail.html?animeUrl=${encodeURIComponent(targetUrl)}`;

                return `
                    <a href="${href}" class="anime-card bg-[#111827]/80 rounded-lg overflow-hidden border border-gray-800 flex flex-col group transition shadow-lg">
                        <div class="relative overflow-hidden aspect-[3/4]">
                            <img src="${img}" alt="${title}" class="w-full h-full object-cover transition duration-500" loading="lazy">
                            ${anime.episodes ? `<span class="absolute bottom-2 right-2 bg-black/80 text-[11px] px-2 py-0.5 rounded text-purple-400 font-semibold border border-gray-800">Ep ${anime.episodes}</span>` : ''}
                            ${anime.score ? `<span class="absolute top-2 left-2 bg-yellow-600 text-[10px] font-bold px-2 py-0.5 rounded shadow"><i class="fa-solid fa-star mr-1"></i>${anime.score}</span>` : ''}
                        </div>
                        <div class="p-3 flex-1 flex flex-col justify-between bg-[#111827]/40">
                            <h3 class="text-sm font-bold line-clamp-2 group-hover:text-purple-400 transition">${title}</h3>
                            ${anime.released ? `<p class="text-[11px] text-gray-500 mt-1">${anime.released}</p>` : ''}
                        </div>
                    </a>
                `;
            }).join('');
        }

        document.getElementById('search-btn').addEventListener('click', () => {
            const q = document.getElementById('search-input').value;
            if(q.trim()) searchAnime(q);
        });
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && e.target.value.trim()) searchAnime(e.target.value);
        });

        document.getElementById('prev-page').addEventListener('click', () => {
            if(currentPage > 1) { currentPage--; document.getElementById('page-num').innerText = `Page ${currentPage}`; loadTerbaru(currentPage); }
        });
        document.getElementById('next-page').addEventListener('click', () => {
            currentPage++; document.getElementById('page-num').innerText = `Page ${currentPage}`; loadTerbaru(currentPage);
        });

        loadTerbaru();
    </script>
</body>
</html>
