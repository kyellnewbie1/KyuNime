<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KyuAnime - Nonton Anime Streaming Subtitle Indonesia</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; font-family: sans-serif; }
        .anime-card:hover img { transform: scale(1.05); }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="bg-[#111827]/90 backdrop-blur-md border-b border-gray-800 sticky top-0 z-50 px-4 py-3">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <a href="index.html" class="text-2xl font-black text-purple-500 tracking-wider">Kyu<span class="text-white">Anime</span></a>
            
            <!-- Search Bar -->
            <div class="relative w-full sm:w-80">
                <input type="text" id="search-input" placeholder="Cari anime favoritmu..." class="w-full bg-[#1f2937]/80 text-sm text-white pl-4 pr-10 py-2 rounded-full border border-gray-700 focus:outline-none focus:border-purple-500">
                <button id="search-btn" class="absolute right-3 top-2.5 text-gray-400 hover:text-purple-500">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        
        <!-- Schedule Days Selector -->
        <section class="mb-8 bg-[#111827]/60 p-4 rounded-xl border border-gray-800/80 backdrop-blur-sm">
            <h2 class="text-sm font-bold uppercase tracking-wider mb-3 text-purple-400"><i class="fa-solid fa-calendar-days mr-2"></i>Jadwal Rilis Anime</h2>
            <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-none text-sm">
                <button onclick="loadSchedule('monday')" class="day-btn px-4 py-2 bg-[#1f2937] rounded-lg hover:bg-purple-600 transition text-white font-medium">Senin</button>
                <button onclick="loadSchedule('tuesday')" class="day-btn px-4 py-2 bg-[#1f2937] rounded-lg hover:bg-purple-600 transition text-white font-medium">Selasa</button>
                <button onclick="loadSchedule('wednesday')" class="day-btn px-4 py-2 bg-[#1f2937] rounded-lg hover:bg-purple-600 transition text-white font-medium">Rabu</button>
                <button onclick="loadSchedule('thursday')" class="day-btn px-4 py-2 bg-[#1f2937] rounded-lg hover:bg-purple-600 transition text-white font-medium">Kamis</button>
                <button onclick="loadSchedule('friday')" class="day-btn px-4 py-2 bg-[#1f2937] rounded-lg hover:bg-purple-600 transition text-white font-medium">Jumat</button>
                <button onclick="loadSchedule('saturday')" class="day-btn px-4 py-2 bg-[#1f2937] rounded-lg hover:bg-purple-600 transition text-white font-medium">Sabtu</button>
                <button onclick="loadSchedule('sunday')" class="day-btn px-4 py-2 bg-[#1f2937] rounded-lg hover:bg-purple-600 transition text-white font-medium">Minggu</button>
            </div>
        </section>

        <!-- Dynamic Section Title -->
        <h2 id="section-title" class="text-xl font-extrabold mb-6 border-l-4 border-purple-500 pl-3 drop-shadow">Anime Terbaru</h2>
        
        <!-- Loading Spinner -->
        <div id="loading" class="flex justify-center items-center py-20 hidden">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-purple-500"></div>
        </div>

        <!-- Anime Grid -->
        <div id="anime-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <!-- Data dimasukkan via JS -->
        </div>

        <!-- Pagination -->
        <div id="pagination" class="flex justify-center gap-4 mt-10">
            <button id="prev-page" class="px-5 py-2 bg-[#111827] border border-gray-800 rounded-lg hover:bg-purple-600 transition disabled:opacity-40">Prev</button>
            <span id="page-num" class="self-center font-bold text-purple-400 bg-[#111827] px-4 py-2 border border-gray-800 rounded-lg">Page 1</span>
            <button id="next-page" class="px-5 py-2 bg-[#111827] border border-gray-800 rounded-lg hover:bg-purple-600 transition">Next</button>
        </div>
    </main>

    <!-- Ambil konfigurasi URL dan background di awal -->
    <script src="config.js"></script>
    <script>
        let currentPage = 1;
        const container = document.getElementById('anime-container');
        const loading = document.getElementById('loading');
        const sectionTitle = document.getElementById('section-title');
        const pagination = document.getElementById('pagination');

        async function fetchAnime(url) {
            loading.classList.remove('hidden');
            container.innerHTML = '';
            try {
                const res = await fetch(url);
                const data = await res.json();
                loading.classList.add('hidden');
                
                console.log("Raw API Response:", data);

                // 1. Jika data langsung berupa Array
                if (Array.isArray(data)) return data;
                
                // 2. Jika dibungkus di dalam properti objek standar
                if (data.result && Array.isArray(data.result)) return data.result;
                if (data.data && Array.isArray(data.data)) return data.data;
                if (data.anime && Array.isArray(data.anime)) return data.anime;

                // 3. PENCARIAN OTOMATIS: Cari properti key mana saja yang isinya Array data
                for (let key in data) {
                    if (Array.isArray(data[key])) {
                        return data[key];
                    }
                }

                // 4. Jika objek tunggal terdeteksi
                if (data.title || data.name || data.title_anime) return [data];

                return [];
            } catch (err) {
                console.error("Fetch error:", err);
                loading.classList.add('hidden');
                container.innerHTML = `<p class="text-red-500 col-span-full text-center py-10">Gagal memuat data dari server API.</p>`;
                return [];
            }
        }

        async function loadTerbaru(page = 1) {
            pagination.classList.remove('hidden');
            sectionTitle.innerText = "Anime Terbaru";
            const items = await fetchAnime(`${CONFIG.API_BASE}/terbaru.php?page=${page}`);
            renderCards(items, true);
        }

        async function loadSchedule(day) {
            pagination.classList.add('hidden');
            const dayNames = {monday:'Senin', tuesday:'Selasa', wednesday:'Rabu', thursday:'Kamis', friday:'Jumat', saturday:'Sabtu', sunday:'Minggu'};
            sectionTitle.innerText = `Jadwal Rilis: Hari ${dayNames[day] || day}`;
            const items = await fetchAnime(`${CONFIG.API_BASE}/schedule.php?day=${day}&perpage=30`);
            renderCards(items, false);
        }

        async function searchAnime(query) {
            pagination.classList.add('hidden');
            sectionTitle.innerText = `Hasil Pencarian: "${query}"`;
            const items = await fetchAnime(`${CONFIG.API_BASE}/search.php?q=${encodeURIComponent(query)}`);
            renderCards(items, false);
        }

        function renderCards(items, isTerbaru = false) {
            if(!items || items.length === 0) {
                container.innerHTML = `<p class="text-gray-400 col-span-full text-center py-10">Tidak ada anime yang dapat ditampilkan.</p>`;
                return;
            }
            container.innerHTML = items.map(anime => {
                const title = anime.title || anime.name || anime.title_anime;
                const img = anime.image || anime.thumb || anime.thumbnail;
                const targetUrl = anime.url || anime.link; 
                
                if (!targetUrl) return '';

                // Jika klik anime terbaru langsung ke watch page, jika list/search ke detail anime
                const href = isTerbaru ? `watch.html?episodeUrl=${encodeURIComponent(targetUrl)}` : `detail.html?animeUrl=${encodeURIComponent(targetUrl)}`;

                return `
                    <a href="${href}" class="anime-card bg-[#111827]/80 backdrop-blur-sm rounded-lg overflow-hidden border border-gray-800 flex flex-col group transition shadow-lg">
                        <div class="relative overflow-hidden aspect-[3/4]">
                            <img src="${img}" alt="${title}" class="w-full h-full object-cover transition duration-500" loading="lazy">
                            ${anime.type ? `<span class="absolute top-2 left-2 bg-purple-600 text-[10px] font-bold px-2 py-0.5 rounded shadow">${anime.type}</span>` : ''}
                            ${anime.episode ? `<span class="absolute bottom-2 right-2 bg-black/80 text-[11px] px-2 py-0.5 rounded text-purple-400 font-semibold border border-gray-800">Ep ${anime.episode}</span>` : ''}
                        </div>
                        <div class="p-3 flex-1 flex flex-col justify-between bg-[#111827]/40">
                            <h3 class="text-sm font-bold line-clamp-2 group-hover:text-purple-400 transition-colors duration-300">${title}</h3>
                            ${anime.status ? `<p class="text-[11px] text-gray-400 mt-1"><i class="fa-solid fa-circle text-[8px] text-green-500 mr-1"></i>${anime.status}</p>` : ''}
                        </div>
                    </a>
                `;
            }).join('');
        }

        // Action Handlers
        document.getElementById('search-btn').addEventListener('click', () => {
            const q = document.getElementById('search-input').value;
            if(q.trim()) searchAnime(q);
        });
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && e.target.value.trim()) searchAnime(e.target.value);
        });

        document.getElementById('prev-page').addEventListener('click', () => {
            if(currentPage > 1) {
                currentPage--;
                document.getElementById('page-num').innerText = `Page ${currentPage}`;
                loadTerbaru(currentPage);
            }
        });
        document.getElementById('next-page').addEventListener('click', () => {
            currentPage++;
            document.getElementById('page-num').innerText = `Page ${currentPage}`;
            loadTerbaru(currentPage);
        });

        // Load data awal otomatis saat web dibuka
        loadTerbaru();
    </script>
</body>
</html>
