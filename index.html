<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KyuNimeID - Platform Streaming & Download Anime Sub Indo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: #0b0f19; 
            color: #e2e8f0; 
            font-family: 'Poppins', sans-serif;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-none::-webkit-scrollbar { display: none; }
    </style>
</head>
<body id="dynamic-bg" class="relative min-h-screen">
    <!-- Overlay Gelap Kualitas Premium -->
    <div class="fixed inset-0 bg-gradient-to-b from-[#0b0f19]/90 via-[#0b0f19]/95 to-[#0b0f19] -z-10"></div>

    <!-- PRO NAVBAR -->
    <nav class="bg-[#111827]/80 backdrop-blur-xl border-b border-gray-800/60 sticky top-0 z-50 px-4 py-3">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
            <!-- Baris Atas: Logo & Menu Cepat -->
            <div class="flex items-center justify-between w-full sm:w-auto gap-6">
                <a href="index.html" class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500 tracking-wider hover:scale-105 transition duration-300">Kyu<span class="text-white">NimeID</span></a>
                <div class="flex items-center gap-4 text-xs font-semibold text-gray-400">
                    <a href="index.html" class="hover:text-purple-400 text-purple-400 transition"><i class="fa-solid fa-fire mr-1"></i> Populer</a>
                </div>
            </div>
            
            <!-- Baris Bawah/Samping: Search & Tombol Profil -->
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <div class="relative flex-1 sm:flex-none sm:w-64 group">
                    <input type="text" id="search-input" placeholder="Cari anime..." class="w-full bg-[#1f2937]/60 text-xs text-white pl-4 pr-10 py-2.5 rounded-xl border border-gray-800 focus:outline-none focus:border-purple-500 focus:bg-[#1f2937]/90 transition duration-300">
                    <button id="search-btn" class="absolute right-3 top-2.5 text-gray-500 group-focus-within:text-purple-400 transition">
                        <i class="fa-solid fa-magnifying-glass text-xs"></i>
                    </button>
                </div>
                
                <div id="nav-user-zone" class="flex-shrink-0">
                    <a href="profile.html" class="inline-block text-xs bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 px-4 py-2.5 rounded-xl font-bold text-white shadow-lg shadow-purple-900/30 whitespace-nowrap transition duration-300">
                        <i class="fa-solid fa-user-astronaut mr-1.5"></i>Masuk
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTAINER -->
    <main class="max-w-7xl mx-auto px-4 py-6 animate-fade-in">
        <!-- Jadwal Rilis Slider -->
        <section class="mb-8 bg-[#111827]/40 p-4 rounded-2xl border border-gray-800/50 backdrop-blur-md">
            <h2 class="text-xs font-bold uppercase tracking-widest mb-3 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400 flex items-center gap-2">
                <i class="fa-solid fa-calendar-alt text-purple-400 animate-pulse"></i> Jadwal Update Hari Ini
            </h2>
            <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-none text-xs">
                <button onclick="loadSchedule('monday')" class="day-btn px-4 py-2 bg-[#1f2937]/40 hover:bg-purple-600 rounded-xl transition duration-300 font-medium border border-gray-800/40 text-gray-300 hover:text-white">Senin</button>
                <button onclick="loadSchedule('tuesday')" class="day-btn px-4 py-2 bg-[#1f2937]/40 hover:bg-purple-600 rounded-xl transition duration-300 font-medium border border-gray-800/40 text-gray-300 hover:text-white">Selasa</button>
                <button onclick="loadSchedule('wednesday')" class="day-btn px-4 py-2 bg-[#1f2937]/40 hover:bg-purple-600 rounded-xl transition duration-300 font-medium border border-gray-800/40 text-gray-300 hover:text-white">Rabu</button>
                <button onclick="loadSchedule('thursday')" class="day-btn px-4 py-2 bg-[#1f2937]/40 hover:bg-purple-600 rounded-xl transition duration-300 font-medium border border-gray-800/40 text-gray-300 hover:text-white">Kamis</button>
                <button onclick="loadSchedule('friday')" class="day-btn px-4 py-2 bg-[#1f2937]/40 hover:bg-purple-600 rounded-xl transition duration-300 font-medium border border-gray-800/40 text-gray-300 hover:text-white">Jumat</button>
                <button onclick="loadSchedule('saturday')" class="day-btn px-4 py-2 bg-[#1f2937]/40 hover:bg-purple-600 rounded-xl transition duration-300 font-medium border border-gray-800/40 text-gray-300 hover:text-white">Sabtu</button>
                <button onclick="loadSchedule('sunday')" class="day-btn px-4 py-2 bg-[#1f2937]/40 hover:bg-purple-600 rounded-xl transition duration-300 font-medium border border-gray-800/40 text-gray-300 hover:text-white">Minggu</button>
            </div>
        </section>

        <!-- Section Title -->
        <div class="flex justify-between items-center mb-6">
            <h2 id="section-title" class="text-sm font-black tracking-wide border-l-4 border-purple-500 pl-3 uppercase">Update Episode Terbaru</h2>
        </div>
        
        <!-- Loading -->
        <div id="loading" class="flex justify-center items-center py-24 hidden">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-purple-500"></div>
        </div>

        <!-- Anime HD Grid -->
        <div id="anime-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5"></div>

        <!-- Pagination -->
        <div id="pagination" class="flex justify-center gap-3 mt-12">
            <button id="prev-page" class="px-5 py-2.5 bg-[#111827]/80 border border-gray-800 rounded-xl hover:bg-purple-600 hover:border-purple-500 transition duration-300 text-xs font-bold">Prev</button>
            <span id="page-num" class="self-center font-bold text-xs text-purple-400 bg-[#111827]/80 px-4 py-2.5 border border-gray-800 rounded-xl">Page 1</span>
            <button id="next-page" class="px-5 py-2.5 bg-[#111827]/80 border border-gray-800 rounded-xl hover:bg-purple-600 hover:border-purple-500 transition duration-300 text-xs font-bold">Next</button>
        </div>
    </main>

    <script src="config.js"></script>
    <script>
        // Set background dari konfigurasi global
        document.getElementById('dynamic-bg').style.backgroundImage = `url('${CONFIG.BG_URL}')`;
        
        // Inisialisasi Klien Supabase secara Global
        const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        let currentPage = 1;
        const container = document.getElementById('anime-container');
        const loading = document.getElementById('loading');
        const sectionTitle = document.getElementById('section-title');
        const pagination = document.getElementById('pagination');

        // Nav User Status Checker
        supabaseClient.auth.getUser().then(({ data: { user } }) => {
            if (user) {
                supabaseClient.from('profiles').select('username, avatar_url').eq('id', user.id).single().then(({ data }) => {
                    if (data) {
                        document.getElementById('nav-user-zone').innerHTML = `
                            <a href="profile.html" class="flex items-center gap-2 bg-[#1f2937]/80 border border-gray-800 px-3 py-1.5 rounded-xl hover:border-purple-500 transition max-w-[150px]">
                                <img src="${data.avatar_url || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + data.username}" class="w-6 h-6 rounded-full object-cover flex-shrink-0">
                                <span class="text-xs font-bold text-white truncate">${data.username}</span>
                            </a>
                        `;
                    }
                });
            }
        });

        // Handler Request Utama API Nanas Proxy
        async function apiRequest(endpoint) {
            loading.classList.remove('hidden');
            container.innerHTML = '';
            try {
                const res = await fetch(`${CONFIG.API_BASE}${endpoint}`);
                const data = await res.json();
                loading.classList.add('hidden');
                return data;
            } catch (err) {
                loading.classList.add('hidden');
                console.error("API Error: ", err);
                return null;
            }
        }

        // Memuat Data Episode Terbaru Samehadaku
        async function loadTerbaru(page = 1) {
            pagination.classList.remove('hidden');
            sectionTitle.innerText = "Update Episode Terbaru";
            const res = await apiRequest(`/terbaru.php?page=${page}`);
            const items = res?.result?.anime_list || res?.result || res;
            renderCards(items, 'terbaru');
        }

        // Memuat Jadwal Rilis
        async function loadSchedule(day) {
            pagination.classList.add('hidden');
            const daysIndo = {monday:'Senin', tuesday:'Selasa', wednesday:'Rabu', thursday:'Kamis', friday:'Jumat', saturday:'Sabtu', sunday:'Minggu'};
            sectionTitle.innerText = `Jadwal Rilis: Hari ${daysIndo[day]}`;
            const res = await apiRequest(`/schedule.php?day=${day}&perpage=test_value`);
            const items = res?.result?.anime_list || res?.result || res;
            renderCards(items, 'schedule');
        }

        // Fitur Pencarian Anime
        async function searchAnime(query) {
            pagination.classList.add('hidden');
            sectionTitle.innerText = `Hasil Pencarian: "${query}"`;
            const res = await apiRequest(`/search.php?q=${encodeURIComponent(query)}`);
            const items = res?.result?.anime_list || res?.result || res;
            renderCards(items, 'search');
        }

        // Render Data Menjadi Grid Card HTML Premium
        function renderCards(items, type) {
            if (!items || !Array.isArray(items) || items.length === 0) {
                container.innerHTML = `<p class="text-gray-500 col-span-full text-center py-12 text-sm">Tidak ditemukan data anime. Silakan coba lagi nanti.</p>`;
                return;
            }
            container.innerHTML = items.map(anime => {
                if (!anime) return '';
                const title = anime.title || anime.name || 'Unknown Anime';
                const img = anime.image || anime.thumb || anime.thumbnail || anime.featured_img_src || 'https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=500';
                
                const animeUrl = anime.url || anime.link || '';
                if(!animeUrl) return '';

                const href = (type === 'terbaru') 
                    ? `watch.html?episodeUrl=${encodeURIComponent(animeUrl)}` 
                    : `detail.html?animeUrl=${encodeURIComponent(animeUrl)}`;

                const epValue = anime.episode || anime.episodes;
                const scoreValue = anime.score || anime.rating;

                return `
                    <a href="${href}" class="group bg-[#111827]/40 rounded-2xl overflow-hidden border border-gray-800/80 hover:border-purple-500/60 flex flex-col transition-all duration-300 hover:-translate-y-1.5 hover:shadow-2xl hover:shadow-purple-950/20 backdrop-blur-md">
                        <div class="relative overflow-hidden aspect-[3/4]">
                            <img src="${img}" alt="${title}" class="w-full h-full object-cover transition duration-700 group-hover:scale-105" loading="lazy">
                            ${epValue ? `<span class="absolute bottom-2.5 right-2.5 bg-purple-600 text-[10px] font-black px-2 py-0.5 rounded shadow-md tracking-wider">EP ${epValue}</span>` : ''}
                            ${scoreValue ? `<span class="absolute top-2.5 left-2.5 bg-black/70 backdrop-blur-md text-[10px] text-yellow-400 font-bold px-2 py-0.5 rounded-lg border border-gray-800/40"><i class="fa-solid fa-star mr-1"></i>${scoreValue}</span>` : ''}
                        </div>
                        <div class="p-3.5 flex-1 flex flex-col justify-between bg-gradient-to-t from-[#111827]/90 to-[#111827]/30">
                            <h3 class="text-xs font-bold line-clamp-2 text-gray-200 group-hover:text-purple-400 transition duration-300">${title}</h3>
                            ${anime.uploaded_on || anime.type ? `<p class="text-[10px] text-gray-500 mt-1.5 font-medium"><i class="fa-regular fa-clock mr-1"></i>${anime.uploaded_on || anime.type}</p>` : ''}
                        </div>
                    </a>
                `;
            }).join('');
        }

        // Event Listener Aksi Kontrol
        document.getElementById('search-btn').addEventListener('click', () => {
            const q = document.getElementById('search-input').value; if(q.trim()) searchAnime(q);
        });
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && e.target.value.trim()) searchAnime(e.target.value);
        });
        document.getElementById('prev-page').addEventListener('click', () => {
            if(currentPage > 1) { currentPage--; document.getElementById('page-num').innerText = `Page ${currentPage}`; loadTerbaru(currentPage); }
        });
        document.getElementById('next-page').addEventListener('click', () => {
            currentPage++; document.getElementById('page-num').innerText = `Page ${currentPage}`; loadTerbaru(currentPage);
        });

        // Eksekusi muat data paling pertama saat siap
        loadTerbaru();
    </script>
</body>
</html>
