<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Anime - KyuAnime</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                            accent: '#ec4899',
                        },
                        dark: {
                            bg: '#080c14',
                            surface: '#0f172a',
                            card: '#131b2e',
                            border: 'rgba(255, 255, 255, 0.08)'
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome & Supabase -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* Base Styling */
        body { 
            background-color: #080c14; 
            color: #f1f5f9; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
        }

        #bg-blur { 
            position: fixed; 
            inset: 0; 
            z-index: -1; 
            filter: blur(35px) brightness(0.25); 
            transform: scale(1.15); 
            background-size: cover; 
            background-position: center; 
            transition: background-image 1s ease; 
        }

        /* Glassmorphism Classes */
        .glass-nav { 
            background: rgba(8, 12, 20, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .glass-panel { 
            background: rgba(19, 27, 46, 0.65); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.6); 
        }

        .ep-card { 
            background: rgba(19, 27, 46, 0.5); 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        .ep-card:hover { 
            transform: translateY(-3px) translateX(4px); 
            background: rgba(124, 58, 237, 0.2); 
            border-color: rgba(167, 139, 250, 0.4); 
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.3);
        }

        /* Animations */
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(24px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-slide-up { animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(124, 58, 237, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(124, 58, 237, 0.7); }
    </style>
</head>
<body class="antialiased selection:bg-brand-500 selection:text-white">

    <div id="bg-blur"></div>

    <!-- NAVBAR -->
    <nav class="glass-nav fixed w-full top-0 z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 sm:h-20 flex items-center justify-between">
            <a href="index.html" class="inline-flex items-center gap-2.5 text-sm sm:text-base font-extrabold text-white hover:text-brand-300 transition-colors group px-3.5 py-2 rounded-xl bg-white/5 border border-white/10 hover:border-brand-500/40">
                <i class="fa-solid fa-arrow-left text-brand-400 group-hover:-translate-x-1 transition-transform"></i>
                <span>Kembali Ke Beranda</span>
            </a>
        </div>
    </nav>

    <!-- MAIN CONTAINER -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 sm:pt-28 pb-16 min-h-screen flex flex-col relative">
        
        <!-- LOADING SPINNER -->
        <div id="loading" class="absolute inset-0 flex flex-col items-center justify-center min-h-[60vh]">
            <div class="w-12 h-12 border-4 border-brand-500/20 border-t-brand-500 rounded-full animate-spin mb-4"></div>
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Memuat Detail Anime...</p>
        </div>

        <!-- CONTENT SECTION -->
        <div id="content" class="hidden animate-slide-up">
            
            <!-- ANIME DETAIL CARD -->
            <div class="glass-panel rounded-3xl p-6 sm:p-8 md:p-10 flex flex-col md:flex-row gap-8 mb-10 relative overflow-hidden">
                <!-- Ambient Ambient Glow Background Effect -->
                <div class="absolute -top-24 -right-24 w-72 h-72 bg-brand-600/20 rounded-full blur-[100px] pointer-events-none"></div>
                <div class="absolute -bottom-24 -left-24 w-72 h-72 bg-brand-accent/15 rounded-full blur-[100px] pointer-events-none"></div>

                <!-- POSTER ANIME -->
                <div class="w-48 sm:w-60 md:w-64 shrink-0 mx-auto md:mx-0 relative group">
                    <img id="anime-img" src="" class="w-full rounded-2xl shadow-2xl border border-white/10 object-cover aspect-[3/4] group-hover:scale-[1.02] transition-transform duration-300" alt="Poster">
                    <div class="absolute top-3 left-3 bg-emerald-500/90 backdrop-blur-md text-white text-[11px] font-black px-3 py-1 rounded-full shadow-lg border border-emerald-400/30 uppercase tracking-wider" id="anime-status"></div>
                </div>

                <!-- DETAIL INFO -->
                <div class="flex-1 flex flex-col justify-center z-10">
                    <h1 id="anime-title" class="text-2xl sm:text-4xl md:text-5xl font-black text-white mb-5 leading-tight tracking-tight drop-shadow-md"></h1>
                    
                    <!-- GRID METADATA -->
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
                        <div class="bg-black/30 p-3.5 rounded-2xl border border-white/5 backdrop-blur-sm">
                            <p class="text-[10px] uppercase tracking-wider text-gray-400 font-bold mb-0.5">Tipe</p>
                            <p id="anime-type" class="font-extrabold text-white text-xs sm:text-sm truncate"></p>
                        </div>
                        <div class="bg-black/30 p-3.5 rounded-2xl border border-white/5 backdrop-blur-sm">
                            <p class="text-[10px] uppercase tracking-wider text-gray-400 font-bold mb-0.5">Studio</p>
                            <p id="anime-studio" class="font-extrabold text-white text-xs sm:text-sm truncate"></p>
                        </div>
                        <div class="bg-black/30 p-3.5 rounded-2xl border border-white/5 backdrop-blur-sm">
                            <p class="text-[10px] uppercase tracking-wider text-gray-400 font-bold mb-0.5">Rilis</p>
                            <p id="anime-released" class="font-extrabold text-white text-xs sm:text-sm truncate"></p>
                        </div>
                        <div class="bg-black/30 p-3.5 rounded-2xl border border-white/5 backdrop-blur-sm">
                            <p class="text-[10px] uppercase tracking-wider text-gray-400 font-bold mb-0.5">Total Ep</p>
                            <p id="anime-total-ep" class="font-extrabold text-brand-400 text-xs sm:text-sm truncate">-</p>
                        </div>
                    </div>

                    <!-- GENRES -->
                    <div id="anime-genres" class="flex flex-wrap gap-2 mb-6"></div>

                    <!-- SINOPSIS -->
                    <div class="bg-black/30 p-5 sm:p-6 rounded-2xl border border-white/5 backdrop-blur-sm">
                        <h3 class="text-xs font-bold text-brand-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                            <i class="fa-solid fa-book-open text-brand-400"></i> Sinopsis
                        </h3>
                        <p id="anime-synopsis" class="text-gray-300 text-xs sm:text-sm leading-relaxed text-justify opacity-90 font-medium"></p>
                    </div>
                </div>
            </div>

            <!-- EPISODE LIST HEADER -->
            <div class="flex items-center gap-3 mb-6">
                <div class="w-1.5 h-7 bg-gradient-to-b from-brand-400 to-brand-accent rounded-full"></div>
                <h2 class="text-xl sm:text-2xl font-black text-white tracking-tight drop-shadow-md">
                    Daftar Episode
                </h2>
            </div>

            <!-- EPISODE GRID -->
            <div id="episode-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3.5 sm:gap-4"></div>
            
        </div>
    </main>
    
    <!-- SCRIPTS INTEGRATION -->
    <script src="config.js"></script>
    <script src="auth.js"></script>
    
    <script>
        const API_BASE = "https://api-nanas.my.id/api/nonton/samehadaku";
        const urlParams = new URLSearchParams(window.location.search);
        const animeUrl = urlParams.get('animeUrl');

        // Fungsi Memuat Background Kustom / Default Halaman
        async function applyDynamicBackground() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data: profile } = await supabaseClient.from('profiles').select('background_url').eq('id', session.user.id).single();
                if (profile && profile.background_url && profile.background_url.trim() !== "") {
                    document.body.style.backgroundImage = `url('${profile.background_url}')`;
                    return;
                }
            }
            if (typeof CONFIG !== 'undefined' && CONFIG.DEFAULT_BACKGROUND) {
                document.body.style.backgroundImage = `url('${CONFIG.DEFAULT_BACKGROUND}')`;
            }
        }

        async function loadDetail() {
            await applyDynamicBackground();
            if(!animeUrl) return document.getElementById('loading').innerHTML = '<p class="text-red-400 font-bold text-sm">URL anime tidak ditemukan atau tidak valid!</p>';
            
            try {
                const res = await fetch(`${API_BASE}/detail.php?url=${encodeURIComponent(animeUrl)}`);
                const data = await res.json();
                
                if(!data.status) throw new Error("Data gagal dimuat");
                const info = data.result;

                document.getElementById('loading').remove();
                document.getElementById('content').classList.remove('hidden');

                // Jika user memiliki kustom background, pakai kustom background. Jika tidak, pakai background anime.
                const { data: { session } } = await supabaseClient.auth.getSession();
                let hasCustomBg = false;
                if (session) {
                    const { data: p } = await supabaseClient.from('profiles').select('background_url').eq('id', session.user.id).single();
                    if(p && p.background_url && p.background_url.trim() !== "") hasCustomBg = true;
                }
                
                if (!hasCustomBg) {
                    document.getElementById('bg-blur').style.backgroundImage = `url('${info.image}')`;
                } else {
                    document.getElementById('bg-blur').style.display = 'none';
                }
                
                document.getElementById('anime-img').src = info.image;
                document.getElementById('anime-title').innerText = info.title;
                document.getElementById('anime-status').innerText = info.status;
                document.getElementById('anime-type').innerText = info.type || '-';
                document.getElementById('anime-studio').innerText = info.studio || '-';
                document.getElementById('anime-released').innerText = info.released || '-';
                
                const totalEp = info.episodes ? info.episodes.length : 0;
                document.getElementById('anime-total-ep').innerText = totalEp + " Ep";
                document.getElementById('anime-synopsis').innerText = info.synopsis || "Sinopsis tidak tersedia.";

                const genres = info.genres || [];
                document.getElementById('anime-genres').innerHTML = genres.map(g => 
                    `<span class="bg-brand-500/20 text-brand-300 text-[11px] font-extrabold px-3.5 py-1 rounded-lg border border-brand-500/30 backdrop-blur-md shadow-sm">${g}</span>`
                ).join('');

                const episodes = info.episodes || [];
                if(episodes.length === 0) {
                    document.getElementById('episode-list').innerHTML = '<p class="col-span-full text-center text-gray-400 py-8 text-sm">Belum ada episode yang dirilis.</p>';
                } else {
                    document.getElementById('episode-list').innerHTML = episodes.map((ep, index) => {
                        const delay = index * 30;
                        return `
                        <a href="watch.html?episodeUrl=${encodeURIComponent(ep.url)}" class="ep-card block p-4 rounded-2xl border border-white/5 group relative overflow-hidden" style="animation: slideUp 0.5s ease forwards; animation-delay: ${delay}ms; opacity: 0;">
                            <div class="absolute inset-0 bg-gradient-to-r from-brand-600/0 via-brand-600/10 to-transparent -translate-x-full group-hover:translate-x-full transition duration-700"></div>
                            
                            <div class="flex justify-between items-center relative z-10">
                                <div class="min-w-0 flex-1 pr-2">
                                    <span class="text-[10px] text-brand-400 font-extrabold tracking-widest uppercase mb-0.5 block">EPISODE ${ep.number}</span>
                                    <h4 class="text-xs sm:text-sm font-bold text-white group-hover:text-brand-300 transition line-clamp-1">${ep.title}</h4>
                                </div>
                                <div class="w-9 h-9 rounded-xl bg-white/5 group-hover:bg-brand-600 flex items-center justify-center transition-all shrink-0 shadow-lg group-hover:shadow-brand-600/40">
                                    <i class="fa-solid fa-play text-xs text-white ml-0.5 group-hover:scale-110 transition-transform"></i>
                                </div>
                            </div>
                        </a>
                    `}).join('');
                }

            } catch(e) { 
                document.getElementById('loading').innerHTML = '<p class="text-red-400 font-bold text-sm">Terjadi kesalahan saat memuat data detail anime.</p>';
            }
        }
        loadDetail();
    </script>
</body>
</html>
