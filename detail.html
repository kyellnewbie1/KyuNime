<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Anime - KyuAnime</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b0f19] text-e2e8f0">

    <nav class="bg-[#111827]/90 border-b border-gray-800 px-4 py-3">
        <div class="max-w-7xl mx-auto"><a href="index.html" class="text-2xl font-black text-purple-500 tracking-wider">Kyu<span class="text-white">Anime</span></a></div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div id="loading" class="text-center py-20"><div class="animate-spin inline-block rounded-full h-12 w-12 border-t-2 border-purple-500"></div></div>
        
        <div id="detail-container" class="hidden">
            <!-- Info Utama -->
            <div class="flex flex-col md:flex-row gap-8 bg-[#111827]/40 p-6 rounded-2xl border border-gray-800 backdrop-blur-md">
                <div class="w-full md:w-64 shrink-0 mx-auto">
                    <img id="anime-img" src="" class="w-full rounded-xl border border-gray-700 shadow-xl object-cover aspect-[3/4]" alt="">
                </div>
                <div class="flex-1">
                    <h1 id="anime-title" class="text-3xl font-black text-white mb-4"></h1>
                    <div class="grid grid-cols-2 gap-2 text-sm text-gray-400 mb-4">
                        <p>Status: <span id="anime-status" class="text-green-400 font-bold"></span></p>
                        <p>Tipe: <span id="anime-type" class="text-white"></span></p>
                        <p>Studio: <span id="anime-studio" class="text-white"></span></p>
                        <p>Rilis: <span id="anime-released" class="text-white"></span></p>
                    </div>
                    <div id="anime-genres" class="flex flex-wrap gap-2 mb-4"></div>
                    <p class="text-sm font-semibold text-purple-400 uppercase tracking-wider mb-1">Sinopsis</p>
                    <p id="anime-synopsis" class="text-gray-300 text-sm leading-relaxed text-justify"></p>
                </div>
            </div>

            <!-- List Episode -->
            <h2 class="text-xl font-bold mt-10 mb-4 border-l-4 border-purple-500 pl-3">Daftar Episode</h2>
            <div id="episode-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
        </div>
    </main>

    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const animeUrl = urlParams.get('animeUrl');

        async function loadDetail() {
            if(!animeUrl) return;
            try {
                const res = await fetch(`${CONFIG.API_BASE}/detail.php?url=${encodeURIComponent(animeUrl)}`);
                const data = await res.json();
                
                if(!data.status) return;
                const info = data.result;

                document.getElementById('loading').remove();
                document.getElementById('detail-container').classList.remove('hidden');

                document.getElementById('anime-title').innerText = info.title;
                document.getElementById('anime-img').src = info.image;
                document.getElementById('anime-status').innerText = info.status;
                document.getElementById('anime-type').innerText = info.type;
                document.getElementById('anime-studio').innerText = info.studio || '-';
                document.getElementById('anime-released').innerText = info.released;
                document.getElementById('anime-synopsis').innerText = info.synopsis;

                // Genres
                document.getElementById('anime-genres').innerHTML = info.genres.map(g => `<span class="bg-[#1f2937] text-xs px-3 py-1 rounded-full border border-gray-700 text-gray-300">${g}</span>`).join('');

                // Episode List
                document.getElementById('episode-list').innerHTML = info.episodes.map(ep => `
                    <a href="watch.html?episodeUrl=${encodeURIComponent(ep.url)}" class="flex justify-between items-center bg-[#111827]/80 hover:bg-purple-950 p-4 rounded-xl border border-gray-800 transition group">
                        <span class="text-sm font-bold text-white group-hover:text-purple-400">Episode ${ep.number} ${ep.title}</span>
                        <span class="text-xs text-gray-500"><i class="fa-solid fa-play mr-1"></i> Tonton</span>
                    </a>
                `).join('');

            } catch(e) { console.error(e); }
        }
        loadDetail();
    </script>
</body>
</html>
