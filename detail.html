<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Anime - KyuNimeID</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: #0b0f19; 
            color: #e2e8f0; 
            font-family: 'Poppins', sans-serif;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="dynamic-bg" class="relative min-h-screen">
    <!-- Premium Dark Overlay -->
    <div class="fixed inset-0 bg-gradient-to-b from-[#0b0f19]/90 via-[#0b0f19]/95 to-[#0b0f19] -z-10"></div>

    <!-- PRO NAVBAR -->
    <nav class="bg-[#111827]/80 backdrop-blur-xl border-b border-gray-800/60 sticky top-0 z-50 px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500 tracking-wider hover:scale-105 transition duration-300">Kyu<span class="text-white">NimeID</span></a>
            
            <div id="nav-user-zone">
                <a href="profile.html" class="text-xs bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 px-4 py-2.5 rounded-xl font-bold text-white shadow-lg shadow-purple-900/30 transition duration-300"><i class="fa-solid fa-user-astronaut mr-1.5"></i>Masuk</a>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="max-w-6xl mx-auto px-4 py-8 animate-fade-in">
        <!-- Loading Spinner -->
        <div id="loading" class="flex justify-center items-center py-24">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-purple-500"></div>
        </div>

        <!-- Info Anime Section -->
        <div id="detail-box" class="hidden grid grid-cols-1 md:grid-cols-4 gap-8">
            <!-- Poster Kiri -->
            <div class="md:col-span-1 space-y-4">
                <div class="relative rounded-2xl overflow-hidden border border-gray-800/80 shadow-2xl group">
                    <img id="anime-cover" src="" alt="Poster" class="w-full h-auto object-cover transition duration-500 group-hover:scale-105">
                    <span id="anime-score" class="absolute top-3 left-3 bg-black/80 backdrop-blur-md text-xs text-yellow-400 font-black px-2.5 py-1 rounded-xl border border-gray-700/50"></span>
                </div>
            </div>

            <!-- Detail Kanan -->
            <div class="md:col-span-3 space-y-6">
                <div>
                    <h1 id="anime-title" class="text-2xl md:text-3xl font-black text-white leading-tight">Memuat Judul...</h1>
                    <p id="anime-title-jp" class="text-xs text-gray-500 mt-1 font-medium"></p>
                </div>

                <!-- Metadata Grid -->
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 bg-[#111827]/40 p-4 rounded-2xl border border-gray-800/50 backdrop-blur-md text-xs">
                    <div><span class="text-gray-500 block mb-0.5">Tipe:</span> <span id="info-type" class="font-bold text-gray-200"></span></div>
                    <div><span class="text-gray-500 block mb-0.5">Status:</span> <span id="info-status" class="font-bold text-purple-400"></span></div>
                    <div><span class="text-gray-500 block mb-0.5">Total Ep:</span> <span id="info-episodes" class="font-bold text-gray-200"></span></div>
                    <div><span class="text-gray-500 block mb-0.5">Durasi:</span> <span id="info-duration" class="font-bold text-gray-200"></span></div>
                    <div><span class="text-gray-500 block mb-0.5">Rilis:</span> <span id="info-released" class="font-bold text-gray-200"></span></div>
                    <div><span class="text-gray-500 block mb-0.5">Studio:</span> <span id="info-studio" class="font-bold text-pink-400"></span></div>
                </div>

                <!-- Genre Badges -->
                <div class="space-y-2">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400">Genre List</h3>
                    <div id="anime-genres" class="flex flex-wrap gap-2"></div>
                </div>

                <!-- Synopsis -->
                <div class="bg-[#111827]/20 p-5 rounded-2xl border border-gray-800/40">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-purple-400 mb-2"><i class="fa-solid fa-book-open mr-1.5"></i> Sinopsis</h3>
                    <p id="anime-synopsis" class="text-xs text-gray-400 leading-relaxed text-justify">Memuat sinopsis cerita...</p>
                </div>
            </div>
        </div>

        <!-- Episode List Section -->
        <section id="episode-section" class="hidden mt-12 bg-[#111827]/40 border border-gray-800/60 rounded-2xl p-5 backdrop-blur-md">
            <h2 class="text-sm font-black uppercase tracking-wider text-gray-200 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-list-ul text-purple-500"></i> Daftar Semua Episode
            </h2>
            <div id="episode-container" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[400px] overflow-y-auto pr-2 scrollbar-thin"></div>
        </section>
    </main>

    <script src="config.js"></script>
    <script>
        document.getElementById('dynamic-bg').style.backgroundImage = `url('${CONFIG.BG_URL}')`;
        const supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const animeUrl = urlParams.get('animeUrl');

        // Nav User Sync Status
        supabase.auth.getUser().then(({ data: { user } }) => {
            if (user) {
                supabase.from('profiles').select('username, avatar_url').eq('id', user.id).single().then(({ data }) => {
                    if (data) {
                        document.getElementById('nav-user-zone').innerHTML = `
                            <a href="profile.html" class="flex items-center gap-2 bg-[#1f2937]/80 border border-gray-800 px-3 py-1.5 rounded-xl hover:border-purple-500 transition">
                                <img src="${data.avatar_url}" class="w-6 h-6 rounded-full object-cover">
                                <span class="text-xs font-bold text-white">${data.username}</span>
                            </a>
                        `;
                    }
                });
            }
        });

        async function loadAnimeDetail() {
            if (!animeUrl) return;

            try {
                const res = await fetch(`${CONFIG.API_BASE}/detail.php?url=${encodeURIComponent(animeUrl)}`);
                const data = await res.json();
                
                document.getElementById('loading').classList.add('hidden');
                if (!data.status) return;

                const anime = data.result;

                // Set View Data
                document.getElementById('anime-title').innerText = anime.title;
                document.getElementById('anime-title-jp').innerText = anime.title_japanese || '';
                document.getElementById('anime-cover').src = anime.image;
                document.getElementById('anime-score').innerHTML = `<i class="fa-solid fa-star mr-1 text-yellow-400"></i> ${anime.score || '0.0'}`;
                document.getElementById('anime-synopsis').innerText = anime.synopsis || 'Tidak ada sinopsis resmi.';

                // Metadata
                document.getElementById('info-type').innerText = anime.type || '-';
                document.getElementById('info-status').innerText = anime.status || '-';
                document.getElementById('info-episodes').innerText = anime.episodes || '-';
                document.getElementById('info-duration').innerText = anime.duration || '-';
                document.getElementById('info-released').innerText = anime.released || '-';
                document.getElementById('info-studio').innerText = anime.studio || '-';

                // Genre Badges Render
                if (anime.genres) {
                    document.getElementById('anime-genres').innerHTML = anime.genres.map(g => `
                        <span class="px-3 py-1 bg-purple-900/30 text-purple-400 text-[10px] font-bold rounded-lg border border-purple-500/20 shadow-sm">${g.name}</span>
                    `).join('');
                }

                // Episode List Render
                if (anime.episode_list && anime.episode_list.length > 0) {
                    document.getElementById('episode-container').innerHTML = anime.episode_list.map(ep => `
                        <a href="watch.html?episodeUrl=${encodeURIComponent(ep.url)}" class="flex items-center justify-between p-3.5 bg-[#1f2937]/40 border border-gray-800/80 rounded-xl hover:border-purple-500/60 hover:bg-[#1f2937]/70 transition group">
                            <span class="text-xs font-semibold text-gray-300 group-hover:text-purple-400 transition line-clamp-1">${ep.title}</span>
                            <span class="text-[10px] bg-purple-600 text-white font-black px-2 py-0.5 rounded shadow-sm tracking-wider flex-shrink-0 ml-2">PLAY</span>
                        </a>
                    `).join('');
                } else {
                    document.getElementById('episode-container').innerHTML = `<p class="text-xs text-gray-500 text-center col-span-full py-4">Belum ada rilis episode untuk anime ini.</p>`;
                }

                // Reveal Elements
                document.getElementById('detail-box').classList.remove('hidden');
                document.getElementById('episode-section').classList.remove('hidden');

            } catch (err) {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        loadAnimeDetail();
    </script>
</body>
</html>
