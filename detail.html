<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Anime - KyuAnime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .glass-panel { background: rgba(17, 24, 39, 0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .ep-card { background: rgba(31, 41, 55, 0.5); backdrop-filter: blur(4px); transition: all 0.3s ease; }
        .ep-card:hover { transform: translateX(10px); background: rgba(147, 51, 234, 0.2); border-color: rgba(168, 85, 247, 0.5); }
        
        body { background-color: #050505; color: #e2e8f0; }
        #bg-blur { position: fixed; inset: 0; z-index: -1; filter: blur(30px) brightness(0.3); transform: scale(1.1); background-size: cover; background-position: center; transition: background-image 1s ease; }
    </style>
</head>
<body class="antialiased selection:bg-purple-500">

    <!-- Dinamis Blur Background -->
    <div id="bg-blur"></div>

    <nav class="fixed w-full top-0 z-50 bg-black/40 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 py-3"><a href="index.html" class="text-2xl font-black text-white tracking-tighter"><i class="fa-solid fa-arrow-left mr-2"></i>Kembali</a></div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pt-24 pb-16 min-h-screen flex flex-col relative">
        <div id="loading" class="absolute inset-0 flex items-center justify-center"><div class="w-16 h-16 border-4 border-purple-500/30 border-t-purple-500 rounded-full animate-spin"></div></div>

        <div id="content" class="hidden animate-slide-up">
            
            <!-- Hero Info Section -->
            <div class="glass-panel rounded-3xl p-6 md:p-10 flex flex-col md:flex-row gap-8 mb-10 relative overflow-hidden">
                <!-- Aksen Cahaya -->
                <div class="absolute -top-24 -right-24 w-64 h-64 bg-purple-600/30 rounded-full blur-[80px]"></div>

                <!-- Poster -->
                <div class="w-48 sm:w-64 shrink-0 mx-auto md:mx-0 relative group">
                    <img id="anime-img" src="" class="w-full rounded-2xl shadow-[0_0_30px_rgba(0,0,0,0.8)] border border-white/10 object-cover aspect-[3/4]" alt="Poster">
                    <div class="absolute top-3 left-3 bg-green-500/90 text-white text-xs font-black px-3 py-1 rounded-full shadow-lg" id="anime-status"></div>
                </div>

                <!-- Detail Text -->
                <div class="flex-1 flex flex-col justify-center z-10">
                    <h1 id="anime-title" class="text-3xl md:text-5xl font-black text-white mb-4 leading-tight drop-shadow-md"></h1>
                    
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-white/5 p-3 rounded-xl border border-white/5"><p class="text-xs text-gray-400">Tipe</p><p id="anime-type" class="font-bold text-white"></p></div>
                        <div class="bg-white/5 p-3 rounded-xl border border-white/5"><p class="text-xs text-gray-400">Studio</p><p id="anime-studio" class="font-bold text-white"></p></div>
                        <div class="bg-white/5 p-3 rounded-xl border border-white/5"><p class="text-xs text-gray-400">Rilis</p><p id="anime-released" class="font-bold text-white"></p></div>
                        <div class="bg-white/5 p-3 rounded-xl border border-white/5"><p class="text-xs text-gray-400">Total Ep</p><p id="anime-total-ep" class="font-bold text-white">-</p></div>
                    </div>

                    <div id="anime-genres" class="flex flex-wrap gap-2 mb-6"></div>

                    <div class="bg-black/30 p-5 rounded-2xl border border-white/5">
                        <h3 class="text-sm font-bold text-purple-400 uppercase tracking-widest mb-2"><i class="fa-solid fa-book-open mr-2"></i>Sinopsis</h3>
                        <p id="anime-synopsis" class="text-gray-300 text-sm md:text-base leading-relaxed text-justify opacity-90"></p>
                    </div>
                </div>
            </div>

            <!-- Episode List -->
            <h2 class="text-2xl font-black mb-6 text-white drop-shadow-md flex items-center gap-3">
                <div class="w-2 h-8 bg-purple-500 rounded-full"></div> Daftar Episode
            </h2>
            <div id="episode-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            
        </div>
    </main>

    <script>
        const API_BASE = "https://api-nanas.my.id/api/nonton/samehadaku";
        const urlParams = new URLSearchParams(window.location.search);
        const animeUrl = urlParams.get('animeUrl');

        async function loadDetail() {
            if(!animeUrl) return document.getElementById('loading').innerHTML = '<p class="text-red-500">URL tidak valid!</p>';
            
            try {
                const res = await fetch(`${API_BASE}/detail.php?url=${encodeURIComponent(animeUrl)}`);
                const data = await res.json();
                
                if(!data.status) throw new Error("Data gagal dimuat");
                const info = data.result;

                document.getElementById('loading').remove();
                document.getElementById('content').classList.remove('hidden');

                // Set Dynamic Background & Image
                document.getElementById('bg-blur').style.backgroundImage = `url('${info.image}')`;
                document.getElementById('anime-img').src = info.image;
                
                // Set Texts
                document.getElementById('anime-title').innerText = info.title;
                document.getElementById('anime-status').innerText = info.status;
                document.getElementById('anime-type').innerText = info.type || '-';
                document.getElementById('anime-studio').innerText = info.studio || '-';
                document.getElementById('anime-released').innerText = info.released || '-';
                document.getElementById('anime-total-ep').innerText = info.episodes.length + " Ep";
                document.getElementById('anime-synopsis').innerText = info.synopsis || "Sinopsis tidak tersedia.";

                // Genres (Gradient Badges)
                document.getElementById('anime-genres').innerHTML = info.genres.map(g => 
                    `<span class="bg-gradient-to-r from-purple-600 to-blue-600 text-white text-xs font-bold px-4 py-1.5 rounded-full shadow-lg border border-white/20">${g}</span>`
                ).join('');

                // Render Episodes (Staggered Animation)
                document.getElementById('episode-list').innerHTML = info.episodes.map((ep, index) => {
                    const delay = index * 30; // Animasi bertingkat
                    return `
                    <a href="watch.html?episodeUrl=${encodeURIComponent(ep.url)}" class="ep-card block p-4 rounded-2xl border border-gray-700/50 group relative overflow-hidden" style="animation: slideUp 0.5s ease forwards; animation-delay: ${delay}ms; opacity: 0;">
                        <!-- Efek cahaya saat hover -->
                        <div class="absolute inset-0 bg-gradient-to-r from-purple-600/0 via-purple-600/10 to-transparent -translate-x-full group-hover:translate-x-full transition duration-700"></div>
                        
                        <div class="flex justify-between items-center relative z-10">
                            <div>
                                <span class="text-xs text-purple-400 font-black tracking-widest uppercase mb-1 block">EPISODE ${ep.number}</span>
                                <h4 class="text-sm font-bold text-white group-hover:text-purple-300 transition line-clamp-1">${ep.title}</h4>
                            </div>
                            <div class="w-10 h-10 rounded-full bg-white/10 group-hover:bg-purple-600 flex items-center justify-center transition shrink-0 ml-3 shadow-lg">
                                <i class="fa-solid fa-play text-white ml-1"></i>
                            </div>
                        </div>
                    </a>
                `}).join('');

            } catch(e) { 
                document.getElementById('loading').innerHTML = '<p class="text-red-500 font-bold">Terjadi kesalahan saat memuat data anime.</p>';
            }
        }
        loadDetail();
    </script>
</body>
</html>
