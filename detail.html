<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Anime - KyuAnime</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #0b0f19; color: #e2e8f0; font-family: sans-serif; }</style>
</head>
<body>

    <!-- Navbar -->
    <nav class="bg-[#111827]/90 backdrop-blur-md border-b border-gray-800 px-4 py-3">
        <div class="max-w-7xl mx-auto"><a href="index.html" class="text-2xl font-black text-purple-500 tracking-wider">Kyu<span class="text-white">Anime</span></a></div>
    </nav>

    <!-- Content -->
    <main class="max-w-5xl mx-auto px-4 py-8">
        <div id="loading" class="flex justify-center items-center py-20"><div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-purple-500"></div></div>
        
        <div id="detail-container" class="hidden space-y-6">
            <!-- Info Card -->
            <div class="flex flex-col md:flex-row gap-6 bg-[#111827]/80 backdrop-blur-sm p-6 rounded-xl border border-gray-800 shadow-xl">
                <img id="anime-img" src="" class="w-full md:w-64 rounded-lg object-cover shadow-2xl border border-gray-700" alt="Cover">
                <div class="flex-1">
                    <h1 id="anime-title" class="text-2xl md:text-3xl font-black text-white mb-3">Loading...</h1>
                    <div id="anime-meta" class="grid grid-cols-2 gap-3 text-sm text-gray-300 mb-4 bg-[#1f2937]/50 p-4 rounded-lg border border-gray-800">
                        <!-- Meta filled via JS -->
                    </div>
                    <h3 class="text-sm font-bold text-purple-400 mb-1 uppercase tracking-wider">Sinopsis:</h3>
                    <p id="anime-synopsis" class="text-sm text-gray-300 leading-relaxed bg-[#0b0f19]/60 p-4 rounded-lg border border-gray-800 max-h-60 overflow-y-auto"></p>
                </div>
            </div>

            <!-- Episode List Card -->
            <div class="bg-[#111827]/80 backdrop-blur-sm p-6 rounded-xl border border-gray-800 shadow-xl">
                <h2 class="text-xl font-bold mb-4 border-l-4 border-purple-500 pl-3">Daftar Semua Episode</h2>
                <div id="episode-list" class="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-[500px] overflow-y-auto pr-2">
                    <!-- Episodes rendered via JS -->
                </div>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const animeUrl = urlParams.get('animeUrl');

        async function loadDetail() {
            if(!animeUrl) return window.location.href = 'index.html';
            
            try {
                const res = await fetch(`${CONFIG.API_BASE}/detail.php?url=${encodeURIComponent(animeUrl)}`);
                const data = await res.json();
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('detail-container').classList.remove('hidden');

                const anime = data.result || data;
                document.getElementById('anime-title').innerText = anime.title || anime.name;
                document.getElementById('anime-img').src = anime.image || anime.thumb;
                document.getElementById('anime-synopsis').innerText = anime.synopsis || "Sinopsis tidak tersedia.";

                const metaContainer = document.getElementById('anime-meta');
                metaContainer.innerHTML = `
                    <div><span class="text-gray-400">Tipe:</span> ${anime.type || '-'}</div>
                    <div><span class="text-gray-400">Status:</span> ${anime.status || '-'}</div>
                    <div><span class="text-gray-400">Total Episode:</span> ${anime.total_episode || '-'}</div>
                    <div><span class="text-gray-400">Skor:</span> ⭐ ${anime.score || '-'}</div>
                    <div class="col-span-2"><span class="text-gray-400">Genre:</span> ${Array.isArray(anime.genres) ? anime.genres.join(', ') : (anime.genre || '-')}</div>
                `;

                const epList = document.getElementById('episode-list');
                const episodes = anime.episodes || [];
                
                if (episodes.length > 0) {
                    epList.innerHTML = episodes.map(ep => `
                        <a href="watch.html?episodeUrl=${encodeURIComponent(ep.url)}" class="flex justify-between items-center p-3 bg-[#111827] rounded-lg border border-gray-800 hover:border-purple-500 hover:bg-[#1f2937] transition text-sm group">
                            <span class="font-medium text-white group-hover:text-purple-400 transition-colors">${ep.title || ep.name}</span>
                            <span class="text-xs text-gray-500 whitespace-nowrap">${ep.date || ''} <i class="fa-solid fa-circle-play ml-1 text-purple-500"></i></span>
                        </a>
                    `).join('');
                } else {
                    epList.innerHTML = `<p class="text-gray-400 col-span-full py-4 text-center">Episode belum dirilis.</p>`;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerHTML = `<p class="text-red-500 text-center">Gagal memuat detail data anime.</p>`;
            }
        }
        loadDetail();
    </script>
</body>
</html>
