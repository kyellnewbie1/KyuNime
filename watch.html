<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Player & Download - KyuNimeID</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body id="dynamic-bg" class="bg-[#0b0f19] text-gray-200 min-h-screen bg-fixed bg-cover bg-center">
    <div class="fixed inset-0 bg-gradient-to-b from-[#0b0f19]/90 to-[#0b0f19] -z-10"></div>

    <!-- NAVBAR -->
    <nav class="bg-[#111827]/80 backdrop-blur-md border-b border-gray-800/80 px-4 py-3 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-purple-500 tracking-wider">Kyu<span class="text-white">NimeID</span></a>
            <a href="index.html" class="text-xs bg-gray-800 px-3 py-1.5 rounded-xl border border-gray-700 text-gray-300 hover:text-white transition"><i class="fa-solid fa-arrow-left mr-1"></i> Kembali</a>
        </div>
    </nav>

    <!-- MAIN APP CONTAINER -->
    <main class="max-w-5xl mx-auto px-4 py-6 space-y-6">
        <h1 id="episode-title" class="text-lg font-black text-white flex items-center gap-2">
            <div class="animate-pulse bg-gray-700 h-5 w-48 rounded"></div>
        </h1>

        <!-- HD Video Stream Box -->
        <div class="relative bg-black rounded-2xl overflow-hidden aspect-video border border-gray-800 shadow-2xl group">
            <div id="player-loading" class="absolute inset-0 flex flex-col justify-center items-center bg-gray-950 z-10 gap-3">
                <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-purple-500"></div>
                <p class="text-xs text-gray-400 font-medium">Menghubungkan ke Server Video...</p>
            </div>
            <!-- ditambahkan sandbox & allow-scripts agar bypass proteksi web mobile -->
            <iframe id="video-player" src="" class="w-full h-full absolute inset-0 hidden" allowfullscreen frameborder="0" scrolling="no" allow="autoplay; encrypted-media; picture-in-picture"></iframe>
        </div>

        <!-- Servers Selector -->
        <div class="bg-[#111827]/40 backdrop-blur-md p-4 rounded-2xl border border-gray-800/60">
            <p class="text-[10px] font-bold text-purple-400 uppercase tracking-widest mb-2.5"><i class="fa-solid fa-server mr-1"></i> Ganti Server Player:</p>
            <div id="server-list" class="flex flex-wrap gap-2">
                <p class="text-xs text-gray-500 italic">Memuat daftar server...</p>
            </div>
        </div>

        <!-- Links Download -->
        <div class="bg-[#111827]/20 rounded-2xl p-4 border border-gray-800/60">
            <h2 class="text-sm font-bold uppercase tracking-wider mb-4 text-purple-400"><i class="fa-solid fa-cloud-arrow-down mr-1.5"></i> Opsi Download File</h2>
            <div id="download-box" class="space-y-3">
                <p class="text-xs text-gray-500 italic">Memuat tautan unduhan...</p>
            </div>
        </div>

        <!-- FITUR KOMENTAR KOMUNITAS (SUPABASE INTEGRATED) -->
        <section class="bg-[#111827]/40 border border-gray-800/80 rounded-2xl p-5 backdrop-blur-md space-y-4">
            <h3 class="text-sm font-black uppercase tracking-wider text-gray-300"><i class="fa-regular fa-comments text-purple-400 mr-1.5"></i> Diskusi Penggemar</h3>
            
            <!-- Box Kirim Komentar -->
            <div id="comment-auth-wrapper">
                <p class="text-xs text-gray-500 text-center py-2 bg-gray-900/30 rounded-xl border border-gray-800">Silakan <a href="profile.html" class="text-purple-400 font-bold hover:underline">Login</a> terlebih dahulu untuk mengirim komentar.</p>
            </div>

            <!-- List Komentar Render -->
            <div id="comments-container" class="space-y-3 divide-y divide-gray-800/40 pt-2">
                <p class="text-xs text-gray-500 text-center py-6">Belum ada komentar di episode ini. Jadilah yang pertama!</p>
            </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script>
        document.getElementById('dynamic-bg').style.backgroundImage = `url('${CONFIG.BG_URL}')`;
        const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const episodeUrl = urlParams.get('episodeUrl');
        
        // Pemotongan slug adaptif untuk memilah query (?page dsb) maupun path bersih
        let slug = '';
        if (episodeUrl) {
            try {
                const cleanPath = episodeUrl.split('?')[0].replace(/\/$/, '');
                slug = cleanPath.substring(cleanPath.lastIndexOf('/') + 1);
            } catch (e) {
                slug = '';
            }
        }

        let userProfile = null;

        async function initWatchPage() {
            if(!episodeUrl) {
                document.getElementById('episode-title').innerText = "URL Episode Tidak Ditemukan!";
                document.getElementById('player-loading').innerHTML = `<p class="text-xs text-red-400">Silakan kembali ke beranda dan pilih episode terlebih dahulu.</p>`;
                return;
            }

            // Load Supabase User
            const { data: { user } } = await supabaseClient.auth.getUser();
            if(user) {
                const { data: prof } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
                if(prof) {
                    userProfile = prof;
                    renderCommentBox();
                    triggerXpReward(prof); 
                }
            }

            loadComments();

            // Fetch Media links & Download data
            try {
                const res = await fetch(`https://api-nanas.my.id/api/nonton/samehadaku/download.php?url=${encodeURIComponent(episodeUrl)}`);
                const dl = await res.json();
                
                if(!dl.status || !dl.result) {
                    document.getElementById('episode-title').innerText = "Gagal memuat detail episode.";
                    document.getElementById('player-loading').innerHTML = `<p class="text-xs text-amber-400">Gagal memproses data API Samehadaku.</p>`;
                    return;
                }

                document.getElementById('episode-title').innerText = dl.result.title || 'Streaming Anime';

                // Servers Player Button Render
                const srvBox = document.getElementById('server-list');
                srvBox.innerHTML = ''; 

                if (dl.result.servers && dl.result.servers.length > 0) {
                    dl.result.servers.forEach((s, idx) => {
                        const b = document.createElement('button');
                        b.id = `srv-btn-${s.id}`;
                        b.className = "srv-buttons px-3 py-1.5 bg-[#1f2937]/50 text-[11px] font-bold rounded-xl border border-gray-800 hover:bg-purple-600 transition text-white";
                        b.innerText = s.name;
                        b.onclick = () => switchStream(s.id);
                        srvBox.appendChild(b);
                    });
                    // Jalankan server pertama otomatis secara default
                    switchStream(dl.result.servers[0].id);
                } else {
                    srvBox.innerHTML = `<p class="text-xs text-gray-500 italic">Tidak ada server streaming tersedia.</p>`;
                    document.getElementById('player-loading').innerHTML = `<p class="text-xs text-amber-400">Gunakan link download di bawah jika player tidak tersedia.</p>`;
                }

                // Downloads Render
                if (dl.result.downloads && dl.result.downloads.length > 0) {
                    document.getElementById('download-box').innerHTML = dl.result.downloads.map(fmt => {
                        if (!fmt || !fmt.qualities) return '';
                        return `
                            <div class="bg-[#111827]/60 p-3 rounded-xl border border-gray-800/40 flex flex-col md:flex-row md:items-center justify-between gap-3">
                                <span class="text-xs font-black text-purple-400 uppercase tracking-widest">${fmt.format || 'MKV/MP4'}</span>
                                <div class="flex flex-col gap-2 w-full md:w-auto">
                                    ${fmt.qualities.map(q => {
                                        if(!q || !q.links) return '';
                                        return `
                                            <div class="flex items-center justify-between sm:justify-end gap-3 text-[11px]">
                                                <span class="text-gray-400 font-medium">${q.quality || 'Unknown'}</span>
                                                <div class="flex flex-wrap gap-1">
                                                    ${q.links.map(l => {
                                                        if(!l || !l.url) return '';
                                                        return `<a href="${l.url}" target="_blank" class="px-2.5 py-1 bg-[#1f2937] hover:bg-green-600 border border-gray-700 hover:border-green-500 rounded-lg text-white font-semibold transition">${l.host || 'Link'}</a>`;
                                                    }).join('')}
                                                </div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    document.getElementById('download-box').innerHTML = `<p class="text-xs text-gray-500 italic">Link download belum tersedia untuk episode ini.</p>`;
                }
            } catch (e) {
                console.error(e);
                document.getElementById('episode-title').innerText = "Terjadi kegagalan jaringan API.";
                document.getElementById('player-loading').innerHTML = `<p class="text-xs text-red-400">Gagal memproses stream video akibat kegagalan API.</p>`;
            }
        }

        async function switchStream(serverId) {
            const playerEl = document.getElementById('video-player');
            const loaderEl = document.getElementById('player-loading');
            
            loaderEl.classList.remove('hidden');
            playerEl.classList.add('hidden');

            // Set styling active state button server
            document.querySelectorAll('.srv-buttons').forEach(btn => {
                btn.classList.replace('bg-purple-600', 'bg-[#1f2937]/50');
            });
            const activeBtn = document.getElementById(`srv-btn-${serverId}`);
            if(activeBtn) activeBtn.classList.replace('bg-[#1f2937]/50', 'bg-purple-600');

            try {
                const res = await fetch(`https://api-nanas.my.id/api/nonton/samehadaku/stream.php?slug=${slug}&server=${serverId}`);
                const data = await res.json();
                
                if(data.status && data.result && data.result.stream_url) {
                    playerEl.src = data.result.stream_url;
                    
                    // Delay sejenak biar iframe tidak kelihatan berkedip kasar pas load
                    playerEl.onload = () => {
                        loaderEl.classList.add('hidden');
                        playerEl.classList.remove('hidden');
                    };
                } else {
                    loaderEl.innerHTML = `<p class="text-xs text-red-400 p-4">Server ini gagal memuat video. Silakan coba server lain atau gunakan opsi download.</p>`;
                }
            } catch(e) {
                loaderEl.innerHTML = `<p class="text-xs text-red-400">Gagal memproses stream video.</p>`;
            }
        }

        // --- SISTEM KOMENTAR ---
        function renderCommentBox() {
            const avatarImg = userProfile.avatar_url || `https://api.dicebear.com/7.x/bottts/svg?seed=${userProfile.id}`;
            document.getElementById('comment-auth-wrapper').innerHTML = `
                <div class="flex gap-3">
                    <img src="${avatarImg}" class="w-8 h-8 rounded-full object-cover">
                    <div class="flex-1 space-y-2">
                        <textarea id="comment-text-input" rows="2" placeholder="Tulis komentar kamu tentang episode ini..." class="w-full bg-[#1f2937]/50 border border-gray-800 rounded-xl px-4 py-2 text-xs text-white focus:outline-none focus:border-purple-500 resize-none"></textarea>
                        <button onclick="postComment()" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white font-bold text-xs rounded-xl shadow transition">Kirim Komentar</button>
                    </div>
                </div>
            `;
        }

        async function loadComments() {
            if (!slug) return;
            const { data, error } = await supabaseClient.from('comments').select('*').eq('episode_slug', slug).order('created_at', { ascending: false });
            if(data && data.length > 0) {
                document.getElementById('comments-container').innerHTML = data.map(c => `
                    <div class="flex gap-3 pt-3">
                        <img src="${c.avatar_url || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + c.username}" class="w-8 h-8 rounded-full object-cover mt-1">
                        <div>
                            <span class="text-xs font-bold text-purple-400 block">${c.username}</span>
                            <p class="text-xs text-gray-300 mt-0.5">${c.comment_text || ''}</p>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function postComment() {
            const txt = document.getElementById('comment-text-input').value;
            if(!txt.trim() || !slug) return;

            const { error } = await supabaseClient.from('comments').insert({
                episode_slug: slug,
                user_id: userProfile.id,
                username: userProfile.username,
                avatar_url: userProfile.avatar_url,
                comment_text: txt
            });

            if(!error) {
                document.getElementById('comment-text-input').value = '';
                loadComments();
            } else {
                alert("Gagal mengirim komentar: " + error.message);
            }
        }

        // --- BONUS XP REWARD ---
        async function triggerXpReward(prof) {
            let nextXp = (prof.level || 1) * 100;
            let newXp = (prof.xp || 0) + 15;
            let newLevel = prof.level || 1;

            if(newLevel === 999999) return; 

            if(newXp >= nextXp) {
                newXp -= nextXp;
                newLevel += 1;
                alert(`🎉 Selamat! Level Otaku kamu naik ke Level ${newLevel}!`);
            }
            await supabaseClient.from('profiles').update({ xp: newXp, level: newLevel }).eq('id', prof.id);
        }

        initWatchPage();
    </script>
</body>
</html>
