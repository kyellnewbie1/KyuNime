<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer"> 
    <title>Nonton Anime - KyuAnime</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                            accent: '#ec4899',
                        },
                        dark: {
                            bg: '#080c14',
                            surface: '#0f172a',
                            card: '#131b2e',
                            border: 'rgba(255, 255, 255, 0.08)'
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome & Supabase -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styling */
        body { 
            background-color: #080c14; 
            color: #f1f5f9; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
        }

        /* Ambient Background Overlay */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 50% 0%, rgba(124, 58, 237, 0.18) 0%, transparent 60%),
                radial-gradient(circle at 90% 40%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        /* Glassmorphism Styles */
        .glass-nav { 
            background: rgba(8, 12, 20, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .glass-panel { 
            background: rgba(19, 27, 46, 0.65); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5); 
        }

        .glass-button { 
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(6px); 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        .glass-button:hover { 
            background: rgba(124, 58, 237, 0.25); 
            border-color: rgba(167, 139, 250, 0.5); 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px -5px rgba(124, 58, 237, 0.35); 
        }

        /* Animations */
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(12px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Role Text Animations */
        .role-owner {
            background: linear-gradient(270deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 400% 400%; 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            animation: rgb-text 3s ease infinite; 
            font-weight: 900;
        }
        @keyframes rgb-text { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .role-breaker {
            background: linear-gradient(45deg, #a855f7, #ec4899, #6366f1, #06b6d4, #a855f7);
            background-size: 200% 200%; 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            animation: nebula-glow 3s ease infinite; 
            font-weight: 900;
            filter: drop-shadow(0 0 5px rgba(168, 85, 247, 0.8)) drop-shadow(0 0 10px rgba(6, 182, 212, 0.5));
        }
        @keyframes nebula-glow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .role-nolep {
            background: linear-gradient(45deg, #ff0000, #1a0000, #8b0000, #000000, #ff0000);
            background-size: 200% 200%; 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            animation: dark-blood 2s ease infinite; 
            font-weight: 900;
            filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.8)) drop-shadow(0 0 10px rgba(139, 0, 0, 0.6));
        }
        @keyframes dark-blood { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(124, 58, 237, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(124, 58, 237, 0.7); }
    </style>
</head>
<body class="antialiased selection:bg-brand-500 selection:text-white">

    <!-- Ambient Effect -->
    <div class="ambient-bg"></div>

    <!-- NAVBAR -->
    <nav class="glass-nav fixed w-full top-0 z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 sm:h-20 flex items-center justify-between">

    <!-- MAIN KONTEN -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 sm:pt-28 pb-16">
        
        <!-- VIDEO PLAYER & TITLE SECTION -->
        <div class="animate-fade">
            <div class="mb-4">
                <span class="inline-flex items-center gap-1.5 text-xs font-semibold text-brand-400 bg-brand-500/10 border border-brand-500/20 px-3 py-1 rounded-full mb-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-brand-400 animate-pulse"></span> Streaming Player
                </span>
                <h1 id="episode-title" class="text-xl sm:text-3xl font-black text-white leading-snug tracking-tight drop-shadow-md">
                    Memuat Episode...
                </h1>
            </div>

            <!-- Frame Player Video -->
            <div class="relative bg-black rounded-2xl sm:rounded-3xl overflow-hidden aspect-video border border-white/10 shadow-2xl mb-6 group ring-1 ring-white/5">
                <iframe id="video-player" src="" class="w-full h-full absolute inset-0 z-10" allowfullscreen frameborder="0"></iframe>
                <div class="absolute inset-0 flex flex-col items-center justify-center z-0 bg-dark-card/80">
                    <div class="w-10 h-10 border-4 border-brand-500/20 border-t-brand-500 rounded-full animate-spin mb-3"></div>
                    <p class="text-xs text-gray-400 font-semibold tracking-wider uppercase">Menyiapkan Pemutar Video...</p>
                </div>
            </div>

            <!-- Ad Slot 1 -->
            <div class="ad-slot hidden my-6 w-full flex justify-center items-center overflow-hidden min-h-[90px] bg-dark-card/40 rounded-2xl border border-white/5"></div>

            <!-- Pilihan Server -->
            <div class="glass-panel p-4 sm:p-6 rounded-2xl mb-8">

        <!-- BANNER HADIAH EXP -->
        <div id="exp-banner" class="glass-panel bg-gradient-to-r from-brand-900/40 via-purple-900/30 to-brand-accent/20 border border-brand-500/30 rounded-2xl p-5 sm:p-6 flex flex-col md:flex-row justify-between items-center mb-8 hidden animate-fade shadow-xl">
            <div class="mb-4 md:mb-0 text-center md:text-left">
                <h3 class="font-extrabold text-white text-base sm:text-lg flex items-center justify-center md:justify-start gap-2">
                    <i class="fa-solid fa-gift text-amber-400 drop-shadow-[0_0_10px_rgba(251,191,36,0.6)]"></i> Hadiah Nonton Anime
                </h3>

            </div>

        <!-- LINK DOWNLOAD SECTION -->
        <div class="mb-10 animate-fade" style="animation-delay: 150ms;">

            </div>

        <!-- Ad Slot 2 -->
        <div class="ad-slot hidden my-8 w-full flex justify-center items-center overflow-hidden min-h-[90px] bg-dark-card/40 rounded-2xl border border-white/5"></div>

        <!-- DISKUSI KOMENTAR -->
        <div class="animate-fade" style="animation-delay: 250ms;">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-1.5 h-6 bg-gradient-to-b from-emerald-400 to-teal-500 rounded-full"></div>
                <h2 class="text-lg sm:text-xl font-bold text-white tracking-tight">Diskusi & Komentar</h2>
            </div>
            
            <!-- Box Input Komentar -->
            <div class="glass-panel p-4 sm:p-5 rounded-2xl mb-6">

    <!-- MODAL PROFIL PUBLIK USER -->
    <div id="public-profile-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] hidden backdrop-blur-md px-4 transition-all duration-300">

    <!-- SCRIPTS INTEGRATION -->
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        const API_BASE = "https://api-nanas.my.id/api/nonton/samehadaku";
        const urlParams = new URLSearchParams(window.location.search);
        const episodeUrl = urlParams.get('episodeUrl');
        const slug = episodeUrl ? episodeUrl.replace(/\/$/, '').split('/').pop() : 'unknown';
        
        let currentUserData = null;
        let selectedUserId = null;

        // FUNGSI CEK ROLE DAN MEMUAT ADSENSE SECARA DINAMIS
        async function checkAndLoadAds(userRole) {
            const role = (userRole || '').toLowerCase();
            
            // JIKA ROLE ADALAH OWNER ATAU BREAKER -> JANGAN TAMPILKAN IKLAN
            if (role === 'owner' || role === 'breaker') {
                console.log('Role:', role, '- Bebas Iklan!');
                return;
            }

            // MUAT SCRIPT ADSENSE & TAMPILKAN BANNER UNTUK MEMBER/TAMU
            if (!document.getElementById('adsense-script')) {
                const adScript = document.createElement('script');
                adScript.id = 'adsense-script';
                adScript.async = true;
                adScript.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3499824854571913";
                adScript.crossOrigin = "anonymous";
                document.head.appendChild(adScript);
            }

            document.querySelectorAll('.ad-slot').forEach(slot => {
                slot.classList.remove('hidden');
                slot.innerHTML = `
                    <ins class="adsbygoogle"
                         style="display:block; width:100%;"
                         data-ad-client="ca-pub-3499824854571913"
                         data-ad-slot="auto"
                         data-ad-format="auto"
                         data-full-width-responsive="true"></ins>
                `;
                try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch(e){}
            });
        }

        async function applyDynamicBackground() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data: profile } = await supabaseClient.from('profiles').select('background_url').eq('id', session.user.id).single();
                if (profile && profile.background_url && profile.background_url.trim() !== "") {
                    document.body.style.backgroundImage = `url('${profile.background_url}')`;
                    return;
                }
            }
            if (typeof CONFIG !== 'undefined' && CONFIG.DEFAULT_BACKGROUND) {
                document.body.style.backgroundImage = `url('${CONFIG.DEFAULT_BACKGROUND}')`;
            }
        }

        async function initWatch() {
            if(!episodeUrl) {
                document.getElementById('episode-title').innerText = "URL Episode Tidak Ditemukan";
                return;
            }
            try {
                const dlRes = await fetch(`${API_BASE}/download.php?url=${encodeURIComponent(episodeUrl)}`);
                const dlData = await dlRes.json();
                
                if(!dlData || !dlData.status) {
                    document.getElementById('episode-title').innerText = "Gagal memuat detail episode.";
                    return;
                }
                
                const result = dlData.result;
                document.getElementById('episode-title').innerText = result.title || "Selesai Memuat";

                const serverList = document.getElementById('server-list');
                serverList.innerHTML = ""; 
                
                const availableServers = result.servers && result.servers.length > 0 ? result.servers : [
                    { id: "1", name: "Server 1 HD" },
                    { id: "2", name: "Server 2" },
                    { id: "3", name: "Server 3" },
                    { id: "4", name: "Server 4" }
                ];

                availableServers.forEach(srv => {
                    const btn = document.createElement('button');
                    btn.className = "glass-button px-4 py-2 text-xs font-bold rounded-xl text-gray-200 hover:text-white transition-all";
                    btn.innerText = srv.name;
                    btn.onclick = (e) => {
                        document.querySelectorAll('#server-list button').forEach(b => {
                            b.classList.remove('bg-brand-600', 'border-brand-400', 'text-white', 'shadow-lg', 'shadow-brand-600/30');
                            b.classList.add('glass-button', 'text-gray-200');
                        });
                        e.target.classList.remove('glass-button', 'text-gray-200');
                        e.target.classList.add('bg-brand-600', 'border-brand-400', 'text-white', 'shadow-lg', 'shadow-brand-600/30');
                        switchServer(srv.id);
                    };
                    serverList.appendChild(btn);
                });

                if(serverList.children.length > 0) {
                    serverList.children[0].click();
                }

                const dlBox = document.getElementById('download-box');
                if (result.downloads && Array.isArray(result.downloads) && result.downloads.length > 0) {
                    dlBox.innerHTML = result.downloads.map(fmt => `
                        <div class="glass-panel rounded-2xl p-4 sm:p-5 overflow-hidden relative border border-white/5 bg-dark-card/50">
                            <div class="absolute top-0 left-0 w-1 bg-brand-500 h-full"></div>
                            <span class="inline-block bg-brand-500/20 text-brand-300 text-[10px] font-black px-3 py-1 rounded-md tracking-wider uppercase mb-3 border border-brand-500/30">
                                ${fmt.format || 'MP4'}
                            </span>
                            <div class="divide-y divide-white/5">
                                ${(fmt.qualities || []).map(q => `
                                    <div class="py-3 flex flex-col md:flex-row md:items-center justify-between gap-3">
                                        <span class="text-xs sm:text-sm font-bold text-gray-200 flex items-center">
                                            <i class="fa-solid fa-display mr-2 text-brand-400"></i> Resolusi ${q.quality || 'Normal'}
                                        </span>
                                        <div class="flex flex-wrap gap-2">
                                            ${(q.links || []).map(lnk => `
                                                <a href="${lnk.url}" target="_blank" class="glass-button px-3.5 py-1.5 text-xs font-semibold rounded-lg text-gray-200 hover:text-white flex items-center hover:bg-emerald-600/40 hover:border-emerald-500 transition-all">
                                                    <i class="fa-solid fa-cloud-arrow-down mr-1.5 text-brand-400"></i> ${lnk.host || 'Link'}
                                                </a>
                                            `).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('');
                } else {
                    dlBox.innerHTML = '<div class="glass-panel p-5 rounded-2xl text-center text-gray-400 text-xs sm:text-sm">Link download tidak ditemukan untuk episode ini.</div>';
                }

            } catch(e) { 
                console.error(e); 
                document.getElementById('episode-title').innerText = "Terjadi kesalahan koneksi API.";
            }
        }

        async function switchServer(serverId) {
            try {
                const streamRes = await fetch(`${API_BASE}/stream.php?slug=${slug}&server=${serverId}`);
                const streamData = await streamRes.json();
                
                let videoUrl = "";
                if(streamData.status && streamData.result) {
                    if (typeof streamData.result === 'object' && streamData.result.stream_url) {
                        videoUrl = streamData.result.stream_url;
                    } else if (typeof streamData.result === 'string') {
                        videoUrl = streamData.result;
                    }
                }
                
                if (videoUrl) {
                    document.getElementById('video-player').src = videoUrl;
                }
            } catch(e) { console.error(e); }
        }

        async function initPage() {
            await applyDynamicBackground();
            initWatch();
            
            const { data: { session } } = await supabaseClient.auth.getSession();
            let userRole = '';
            
            if(session) {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                currentUserData = data;
                if(data && data.role) userRole = data.role;
                setupExpSystem();
            }

            // Eksekusi pengecekan iklan berdasarkan role user
            await checkAndLoadAds(userRole);

            loadComments();
        }

        function setupExpSystem() {
            const expBanner = document.getElementById('exp-banner');
            const claimBtn = document.getElementById('claim-exp-btn');
            const statusTxt = document.getElementById('exp-status');
            
            expBanner.classList.remove('hidden');

            const requiredTime = 30; 
            let timer = requiredTime;
            
            const interval = setInterval(() => {
                timer--;
                if(timer <= 0) {
                    clearInterval(interval);
                    statusTxt.innerHTML = "<span class='text-emerald-400 font-bold'>EXP Siap Diklaim!</span> Terima kasih sudah menonton.";
                    claimBtn.innerText = "Klaim EXP!";
                    claimBtn.disabled = false;
                    claimBtn.className = "bg-gradient-to-r from-amber-400 to-amber-500 hover:from-amber-300 hover:to-amber-400 text-slate-950 font-extrabold py-2.5 px-6 rounded-xl transition shadow-lg shadow-amber-500/40 animate-bounce transform hover:scale-105 text-xs sm:text-sm";
                }
            }, 1000);

            claimBtn.addEventListener('click', async () => {
                claimBtn.disabled = true;
                claimBtn.innerText = "Memproses...";

                const gainedExp = Math.floor(Math.random() * 100) + 50; 
                let newExp = currentUserData.exp + gainedExp;
                let newLevel = Math.floor(newExp / 500) + 1;
                
                let levelUpMsg = newLevel > currentUserData.level ? `🎉 LEVEL UP! Kamu naik ke Level ${newLevel}.` : '';

                await supabaseClient.from('profiles').update({ exp: newExp, level: newLevel }).eq('id', currentUserData.id);
                
                alert(`Selamat! Kamu mendapat ${gainedExp} EXP. ${levelUpMsg}`);
                expBanner.classList.add('hidden'); 
            });
        }

        async function loadComments() {
            const list = document.getElementById('comments-list');
            list.innerHTML = '<div class="text-center py-8"><div class="w-8 h-8 border-2 border-brand-500/30 border-t-brand-500 rounded-full animate-spin mx-auto"></div></div>';

            let { data, error } = await supabaseClient
                .from('comments')
                .select(`id, content, created_at, user_id, profiles!user_id(*)`) 
                .eq('episode_slug', slug)
                .order('created_at', { ascending: false });

            if (error) {
                const rawComments = await supabaseClient
                    .from('comments')
                    .select(`id, content, created_at, user_id`)
                    .eq('episode_slug', slug)
                    .order('created_at', { ascending: false });

                if (!rawComments.error && rawComments.data) {
                    error = null;
                    const userIds = [...new Set(rawComments.data.map(item => item.user_id))];
                    
                    let profilesMap = {};
                    if (userIds.length > 0) {
                        const { data: profs } = await supabaseClient.from('profiles').select('*').in('id', userIds);
                        if (profs) {
                            profs.forEach(p => profilesMap[p.id] = p);
                        }
                    }

                    data = rawComments.data.map(item => ({
                        ...item,
                        profiles: profilesMap[item.user_id] || null
                    }));
                }
            }

            if(error) {
                list.innerHTML = `<div class="glass-panel p-6 rounded-2xl text-center"><p class="text-red-400 text-xs sm:text-sm">Gagal memuat komentar.</p></div>`;
                return;
            }

            if(!data || data.length === 0) {
                list.innerHTML = '<div class="glass-panel p-6 rounded-2xl text-center"><p class="text-gray-400 text-xs sm:text-sm">Belum ada komentar. Jadilah yang pertama berkomentar!</p></div>';
                return;
            }

            list.innerHTML = data.map(c => {
                const prof = c.profiles || { full_name: 'Anonim', avatar_url: 'https://via.placeholder.com/150', role: 'user', level: 0 };
                const userRole = prof.role ? prof.role.toLowerCase() : 'user';
                const isOwner = userRole === 'owner';
                const isBreaker = userRole === 'breaker';

                let nameClass = 'text-gray-200';
                if (isOwner) nameClass = 'role-owner';
                else if (isBreaker) nameClass = 'role-breaker';

                let roleBadge = '';
                if (isOwner) {
                    roleBadge = `<span class="bg-red-950/80 border border-red-500/30 text-red-300 text-[10px] px-2 py-0.5 rounded-md font-bold shadow-inner"><i class="fa-solid fa-crown mr-1"></i>Owner</span>`;
                } else if (isBreaker) {
                    roleBadge = `<span class="bg-purple-950/80 border border-purple-500/50 text-purple-200 text-[10px] px-2 py-0.5 rounded-md font-bold shadow-[0_0_8px_rgba(168,85,247,0.6)]"><i class="fa-solid fa-wand-magic-sparkles mr-1 text-cyan-400"></i>Breaker</span>`;
                }

                return `
                <div class="glass-panel p-4 rounded-2xl flex gap-3.5 sm:gap-4 transition hover:bg-white/5 border border-white/5 bg-dark-card/40">
                    <img src="${prof.avatar_url || 'https://via.placeholder.com/150'}" onclick="openProfile('${c.user_id}')" class="w-10 h-10 sm:w-11 sm:h-11 rounded-full border border-white/10 object-cover cursor-pointer hover:border-brand-400 transition shrink-0" title="Lihat Profil">
                    <div class="flex-1 min-w-0">
                        <div class="flex flex-wrap items-center gap-2 mb-1">
                            <span onclick="openProfile('${c.user_id}')" class="font-bold text-xs sm:text-sm cursor-pointer hover:underline truncate ${nameClass}">${prof.full_name || 'Anonim'}</span>
                            <span class="bg-brand-950/80 border border-brand-500/30 text-brand-300 text-[10px] px-2 py-0.5 rounded-md font-bold">Lv.${prof.level || 0}</span>
                            ${roleBadge}
                        </div>
                        <p class="text-gray-300 text-xs sm:text-sm leading-relaxed mt-1 break-words">${c.content}</p>
                    </div>
                </div>
                `;
            }).join('');
        }

        document.getElementById('post-comment-btn').addEventListener('click', async () => {
            if(!currentUserData) {
                alert("Silakan Login terlebih dahulu untuk berkomentar!");
                window.location.href = "auth.html";
                return;
            }
            const content = document.getElementById('comment-input').value;
            if(!content.trim()) return;

            const btn = document.getElementById('post-comment-btn');
            btn.innerText = "Mengirim..."; btn.disabled = true;

            const { error } = await supabaseClient.from('comments').insert({ user_id: currentUserData.id, episode_slug: slug, content: content });
            
            if (error) {
                alert("Gagal mengirim komentar: " + error.message);
            }

            document.getElementById('comment-input').value = '';
            btn.innerText = "Kirim Komentar"; btn.disabled = false;
            loadComments();
        });

        async function openProfile(userId) {
            selectedUserId = userId;
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', userId).single();
            if(!data) return;

            const modalBanner = document.getElementById('modal-banner');
            if (data.banner_url && data.banner_url.trim() !== "") {
                modalBanner.style.backgroundImage = `url('${data.banner_url}')`;
            } else {
                modalBanner.style.backgroundImage = '';
            }

            document.getElementById('modal-avatar').src = data.avatar_url || 'https://via.placeholder.com/150';
            document.getElementById('modal-name').innerText = data.full_name;
            document.getElementById('modal-id').innerText = `#${data.user_id}`;
            document.getElementById('modal-level').innerText = data.level;
            document.getElementById('modal-exp').innerText = data.exp;
            
            const roleEl = document.getElementById('modal-role');
            if (data.role === 'owner') {
                roleEl.innerText = '👑 Owner Server';
                roleEl.className = 'text-[11px] font-black mb-5 uppercase tracking-widest role-owner';
            } else if (data.role === 'breaker') {
                roleEl.innerText = '🔮 Breaker';
                roleEl.className = 'text-[11px] font-black mb-5 uppercase tracking-widest role-breaker';
            } else if (data.role === 'nolep') {
                roleEl.innerText = '🩸 Nolep';
                roleEl.className = 'text-[12px] font-black mb-5 uppercase tracking-widest role-nolep';
            } else {
                roleEl.innerText = 'Wibu Member';
                roleEl.className = 'text-[11px] font-black mb-5 uppercase tracking-widest text-brand-400';
            }

            const addFriendBtn = document.getElementById('add-friend-btn');
            if(currentUserData && currentUserData.id !== userId) {
                addFriendBtn.classList.remove('hidden');
            } else {
                addFriendBtn.classList.add('hidden'); 
            }

            document.getElementById('public-profile-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('public-profile-modal').classList.add('hidden'); }

        document.getElementById('add-friend-btn').addEventListener('click', async () => {
            if(!currentUserData) return alert("Silakan Login terlebih dahulu!");
            
            const btn = document.getElementById('add-friend-btn');
            btn.innerText = "Mengirim Request...";
            
            const { error } = await supabaseClient.from('friends').insert({
                requester_id: currentUserData.id,
                receiver_id: selectedUserId,
                status: 'pending'
            });

            if(error) {
                alert("Permintaan pertemanan sudah dikirim sebelumnya atau terjadi kesalahan!");
            } else {
                alert("Permintaan pertemanan berhasil dikirim!");
            }
            btn.innerHTML = `<i class="fa-solid fa-user-plus mr-1.5"></i>Tambah Teman`;
            closeModal();
        });

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
