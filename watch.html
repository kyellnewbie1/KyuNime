<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonton Anime - KyuAnime</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .role-owner {
            background: linear-gradient(270deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rgb-text 3s ease infinite;
            font-weight: 900;
        }
        @keyframes rgb-text { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-200">

    <nav class="bg-[#111827]/90 border-b border-gray-800 px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-purple-500 tracking-wider">Kyu<span class="text-white">Anime</span></a>
            <div id="user-nav-area"></div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-6">
        <h1 id="episode-title" class="text-xl font-bold mb-4 text-white">Memuat Halaman Nonton...</h1>

        <div class="relative bg-black rounded-2xl overflow-hidden aspect-video border border-gray-800 shadow-2xl mb-4">
            <iframe id="video-player" src="" class="w-full h-full absolute inset-0" allowfullscreen frameborder="0"></iframe>
        </div>

        <!-- Sistem Klaim EXP -->
        <div id="exp-banner" class="bg-gradient-to-r from-purple-900/50 to-blue-900/50 border border-purple-500/30 rounded-xl p-4 flex justify-between items-center mb-8 hidden">
            <div>
                <h3 class="font-bold text-white"><i class="fa-solid fa-gift text-yellow-400 mr-2"></i>Hadiah Menonton</h3>
                <p class="text-xs text-gray-400" id="exp-status">Tonton anime ini selama beberapa saat untuk mendapatkan EXP.</p>
            </div>
            <button id="claim-exp-btn" disabled class="bg-gray-700 text-gray-400 font-bold py-2 px-4 rounded-lg cursor-not-allowed transition">
                Tunggu...
            </button>
        </div>

        <!-- Komentar Section -->
        <h2 class="text-lg font-bold mb-4 border-l-4 border-purple-500 pl-3"><i class="fa-solid fa-comments mr-2"></i>Komentar</h2>
        
        <div class="bg-[#111827]/60 p-4 rounded-xl border border-gray-800 mb-6">
            <textarea id="comment-input" rows="3" class="w-full bg-[#1f2937]/80 text-sm text-white p-3 rounded-lg border border-gray-700 focus:outline-none focus:border-purple-500 mb-2" placeholder="Tulis komentar atau diskusi anime ini..."></textarea>
            <button id="post-comment-btn" class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold py-2 px-6 rounded-lg transition">Kirim Komentar</button>
        </div>

        <div id="comments-list" class="space-y-4 mb-10"></div>
    </main>

    <!-- Modal Profil Publik -->
    <div id="public-profile-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] hidden backdrop-blur-sm px-4">
        <div class="bg-[#111827] rounded-2xl border border-gray-700 w-full max-w-md overflow-hidden shadow-2xl">
            <div class="h-20 bg-gradient-to-r from-purple-800 to-black"></div>
            <div class="px-6 pb-6 relative -mt-10 text-center">
                <img id="modal-avatar" src="" class="w-24 h-24 rounded-full border-4 border-[#111827] mx-auto object-cover bg-gray-800 mb-3">
                <h3 id="modal-name" class="text-xl font-black text-white"></h3>
                <p class="text-xs text-gray-400 mb-1 font-mono">ID: <span id="modal-id"></span></p>
                <p class="text-sm font-bold mb-4 uppercase tracking-widest" id="modal-role"></p>
                
                <div class="flex justify-center gap-4 mb-6">
                    <div class="bg-[#1f2937] px-4 py-2 rounded-lg border border-gray-700">
                        <span class="block text-xs text-gray-400">Level</span>
                        <span id="modal-level" class="text-lg font-bold text-purple-400"></span>
                    </div>
                    <div class="bg-[#1f2937] px-4 py-2 rounded-lg border border-gray-700">
                        <span class="block text-xs text-gray-400">Total EXP</span>
                        <span id="modal-exp" class="text-lg font-bold text-green-400"></span>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button id="add-friend-btn" class="flex-1 bg-purple-600 hover:bg-purple-500 text-white font-bold py-2 rounded-lg transition text-sm">
                        <i class="fa-solid fa-user-plus mr-2"></i>Tambah Teman
                    </button>
                    <button onclick="closeModal()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white font-bold rounded-lg transition text-sm">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const episodeUrl = urlParams.get('episodeUrl');
        const slug = episodeUrl ? episodeUrl.replace(/\/$/, '').split('/').pop() : 'unknown';
        const supabaseUrl = CONFIG.SUPABASE_URL;
        const supabaseKey = CONFIG.SUPABASE_ANON_KEY;
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        
        let currentUserData = null;
        let selectedUserId = null;

        async function initPage() {
            // Cek Auth untuk fitur EXP & Komen
            const { data: { session } } = await supabaseClient.auth.getSession();
            if(session) {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                currentUserData = data;
                setupExpSystem();
            }

            loadComments();
            // Panggil API Video Player di sini seperti kode aslimu...
            // initWatch(); 
        }

        /* --- SISTEM LEVEL & EXP --- */
        function setupExpSystem() {
            const expBanner = document.getElementById('exp-banner');
            const claimBtn = document.getElementById('claim-exp-btn');
            const statusTxt = document.getElementById('exp-status');
            
            expBanner.classList.remove('hidden');

            // Simulasi menonton (Misal: Harus standby 3 menit. Untuk testing kita set 10 detik)
            const requiredTime = 10; 
            let timer = requiredTime;
            
            const interval = setInterval(() => {
                timer--;
                if(timer <= 0) {
                    clearInterval(interval);
                    statusTxt.innerText = "EXP siap diklaim!";
                    claimBtn.innerText = "Klaim EXP";
                    claimBtn.disabled = false;
                    claimBtn.className = "bg-yellow-500 hover:bg-yellow-400 text-black font-black py-2 px-6 rounded-lg transition shadow-[0_0_15px_rgba(234,179,8,0.5)] animate-bounce";
                }
            }, 1000);

            claimBtn.addEventListener('click', async () => {
                claimBtn.disabled = true;
                claimBtn.innerText = "Memproses...";

                // Random EXP (50 - 150)
                const gainedExp = Math.floor(Math.random() * 100) + 50; 
                let newExp = currentUserData.exp + gainedExp;
                
                // Logika Level Up (Setiap 500 EXP naik 1 level)
                let newLevel = Math.floor(newExp / 500) + 1;
                let levelUpMsg = newLevel > currentUserData.level ? `🎉 LEVEL UP! Kamu sekarang Level ${newLevel}.` : '';

                await supabaseClient.from('profiles').update({ exp: newExp, level: newLevel }).eq('id', currentUserData.id);
                
                alert(`Selamat! Kamu mendapat ${gainedExp} EXP. ${levelUpMsg}`);
                expBanner.classList.add('hidden'); // Sembunyikan setelah klaim
            });
        }

        /* --- SISTEM KOMENTAR --- */
        async function loadComments() {
            const list = document.getElementById('comments-list');
            list.innerHTML = '<p class="text-gray-500 text-sm">Memuat komentar...</p>';

            const { data, error } = await supabaseClient
                .from('comments')
                .select(`id, content, created_at, user_id, profiles(full_name, avatar_url, role, level, user_id)`)
                .eq('episode_slug', slug)
                .order('created_at', { ascending: false });

            if(error || !data.length) {
                list.innerHTML = '<p class="text-gray-500 text-sm">Belum ada komentar. Jadilah yang pertama!</p>';
                return;
            }

            list.innerHTML = data.map(c => `
                <div class="flex gap-4 p-4 bg-[#1f2937]/50 rounded-xl border border-gray-800">
                    <img src="${c.profiles.avatar_url}" onclick="openProfile('${c.user_id}')" class="w-10 h-10 rounded-full border border-gray-600 object-cover cursor-pointer hover:border-purple-400 transition" title="Lihat Profil">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span onclick="openProfile('${c.user_id}')" class="font-bold text-sm text-white cursor-pointer hover:underline ${c.profiles.role === 'owner' ? 'role-owner' : ''}">${c.profiles.full_name}</span>
                            <span class="bg-purple-900 text-purple-300 text-[10px] px-2 py-0.5 rounded-full font-bold">Lv.${c.profiles.level}</span>
                            ${c.profiles.role === 'owner' ? `<span class="bg-red-900 text-red-300 text-[10px] px-2 py-0.5 rounded-full font-bold"><i class="fa-solid fa-crown"></i> Owner</span>` : ''}
                        </div>
                        <p class="text-gray-300 text-sm leading-relaxed">${c.content}</p>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('post-comment-btn').addEventListener('click', async () => {
            if(!currentUserData) return alert("Silakan Login terlebih dahulu untuk berkomentar!");
            const content = document.getElementById('comment-input').value;
            if(!content.trim()) return;

            await supabaseClient.from('comments').insert({ user_id: currentUserData.id, episode_slug: slug, content: content });
            document.getElementById('comment-input').value = '';
            loadComments();
        });

        /* --- SISTEM MODAL PROFIL & ADD FRIEND --- */
        async function openProfile(userId) {
            selectedUserId = userId;
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', userId).single();
            if(!data) return;

            document.getElementById('modal-avatar').src = data.avatar_url;
            document.getElementById('modal-name').innerText = data.full_name;
            document.getElementById('modal-id').innerText = `#${data.user_id}`;
            document.getElementById('modal-level').innerText = data.level;
            document.getElementById('modal-exp').innerText = data.exp;
            
            const roleEl = document.getElementById('modal-role');
            roleEl.innerText = data.role === 'owner' ? '👑 Owner' : 'Member';
            roleEl.className = `text-sm font-bold mb-4 uppercase tracking-widest ${data.role === 'owner' ? 'role-owner' : 'text-blue-400'}`;

            const addFriendBtn = document.getElementById('add-friend-btn');
            if(currentUserData && currentUserData.id !== userId) {
                addFriendBtn.classList.remove('hidden');
            } else {
                addFriendBtn.classList.add('hidden'); // Sembunyikan jika profil sendiri atau belum login
            }

            document.getElementById('public-profile-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('public-profile-modal').classList.add('hidden'); }

        document.getElementById('add-friend-btn').addEventListener('click', async () => {
            if(!currentUserData) return alert("Silakan Login terlebih dahulu!");
            
            const { error } = await supabaseClient.from('friends').insert({
                requester_id: currentUserData.id,
                receiver_id: selectedUserId,
                status: 'pending'
            });

            if(error) {
                alert("Permintaan pertemanan sudah dikirim sebelumnya!");
            } else {
                alert("Permintaan pertemanan berhasil dikirim!");
            }
        });

        initPage();
    </script>
</body>
</html>
