<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonton Anime - KyuAnime</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b0f19] text-gray-200">

    <nav class="bg-[#111827]/90 border-b border-gray-800 px-4 py-3">
        <div class="max-w-7xl mx-auto"><a href="index.html" class="text-2xl font-black text-purple-500 tracking-wider">Kyu<span class="text-white">Anime</span></a></div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-6">
        <h1 id="episode-title" class="text-xl font-bold mb-4 text-white">Memuat Halaman Nonton...</h1>

        <!-- Video Player Wrapper -->
        <div class="relative bg-black rounded-2xl overflow-hidden aspect-video border border-gray-800 shadow-2xl mb-6">
            <iframe id="video-player" src="" class="w-full h-full absolute inset-0" allowfullscreen frameborder="0"></iframe>
        </div>

        <!-- Pilihan Server Stream -->
        <div class="bg-[#111827]/60 p-4 rounded-xl border border-gray-800 mb-8">
            <p class="text-xs font-bold text-purple-400 uppercase tracking-wider mb-2"><i class="fa-solid fa-server mr-1"></i> Pilih Server Player:</p>
            <div id="server-list" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- Area Download -->
        <h2 class="text-lg font-bold mb-4 border-l-4 border-purple-500 pl-3"><i class="fa-solid fa-download mr-2"></i>Link Download Episode</h2>
        <div id="download-box" class="space-y-4"></div>
    </main>

    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const episodeUrl = urlParams.get('episodeUrl');

        async function initWatch() {
            if(!episodeUrl) return;
            try {
                // 1. Ambil data Download untuk memetakan server list & file download
                const dlRes = await fetch(`${CONFIG.API_BASE}/download.php?url=${encodeURIComponent(episodeUrl)}`);
                const dlData = await dlRes.json();
                if(!dlData.status) return;
                
                const result = dlData.result;
                document.getElementById('episode-title').innerText = result.title;

                // 2. Render Pilihan Server Streaming
                const serverList = document.getElementById('server-list');
                result.servers.forEach(srv => {
                    const btn = document.createElement('button');
                    btn.className = "px-4 py-2 bg-[#1f2937] text-xs font-semibold rounded-lg border border-gray-700 hover:bg-purple-600 transition text-white";
                    btn.innerText = srv.name;
                    btn.onclick = () => switchServer(srv.id);
                    serverList.appendChild(btn);
                });

                // Set server default pertama kali (Server ID 1)
                if(result.servers.length > 0) switchServer(result.servers[0].id);

                // 3. Render Link Download Berdasarkan Format & Kualitas
                const dlBox = document.getElementById('download-box');
                dlBox.innerHTML = result.downloads.map(fmt => `
                    <div class="bg-[#111827]/40 border border-gray-800 rounded-xl p-4">
                        <span class="bg-purple-600 text-xs font-extrabold px-3 py-1 rounded text-white tracking-widest uppercase">${fmt.format}</span>
                        <div class="mt-3 divide-y divide-gray-800/60">
                            ${fmt.qualities.map(q => `
                                <div class="py-3 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                                    <span class="text-sm font-bold text-gray-300"><i class="fa-solid fa-display mr-2 text-purple-400"></i>Resolusi ${q.quality}</span>
                                    <div class="flex flex-wrap gap-1.5">
                                        ${q.links.map(lnk => `
                                            <a href="${lnk.url}" target="_blank" class="px-3 py-1 bg-[#1f2937] hover:bg-green-600 border border-gray-700 hover:border-green-500 text-xs rounded transition text-white font-medium">
                                                <i class="fa-solid fa-cloud-arrow-down mr-1"></i>${lnk.host}
                                            </a>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');

            } catch(e) { console.error(e); }
        }

        // Fungsi memanggil API Stream untuk mengubah src iframe video player
        async function switchServer(serverId) {
            // Kita potong slug dari URL halaman nonton samehadaku asli
            const slug = episodeUrl.replace(/\/$/, '').split('/').pop();
            try {
                const streamRes = await fetch(`${CONFIG.API_BASE}/stream.php?slug=${slug}&server=${serverId}`);
                const streamData = await streamRes.json();
                if(streamData.status && streamData.result.stream_url) {
                    document.getElementById('video-player').src = streamData.result.stream_url;
                }
            } catch(e) { console.error(e); }
        }

        initWatch();
    </script>
</body>
</html>
