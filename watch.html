<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonton Anime - KyuAnime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050505; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        body::before {
            content: ''; position: fixed; inset: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 10%, rgba(88, 28, 135, 0.2), transparent 70%); z-index: -1;
        }
        .glass-panel { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5); }
        .glass-button { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(4px); transition: all 0.3s ease; }
        .glass-button:hover { background: rgba(168, 85, 247, 0.3); border-color: rgba(168, 85, 247, 0.5); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(168, 85, 247, 0.3); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s ease forwards; }
        .role-owner {
            background: linear-gradient(270deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: rgb-text 3s ease infinite; font-weight: 900;
        }
        @keyframes rgb-text { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* EFEK BLING-BLING NEBULA COSMIC UNTUK BREAKER */
        .role-breaker {
            background: linear-gradient(45deg, #a855f7, #ec4899, #6366f1, #06b6d4, #a855f7);
            background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: nebula-glow 3s ease infinite; font-weight: 900;
            filter: drop-shadow(0 0 5px rgba(168, 85, 247, 0.8)) drop-shadow(0 0 10px rgba(6, 182, 212, 0.5));
        }
        @keyframes nebula-glow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="antialiased selection:bg-purple-500">

    <nav class="fixed w-full top-0 z-50 bg-black/50 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-white tracking-tighter hover:text-purple-400 transition">
                <i class="fa-solid fa-arrow-left mr-2"></i>Kembali
            </a>
            <div id="user-nav-area"></div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 pt-24 pb-12">
        
        <div class="animate-fade">
            <h1 id="episode-title" class="text-2xl md:text-3xl font-black mb-4 text-white drop-shadow-md">Memuat Episode...</h1>

            <div class="relative bg-black rounded-3xl overflow-hidden aspect-video border border-gray-700 shadow-[0_0_30px_rgba(0,0,0,0.8)] mb-6 group">
                <iframe id="video-player" src="" class="w-full h-full absolute inset-0 z-10" allowfullscreen frameborder="0"></iframe>
                <div class="absolute inset-0 flex items-center justify-center z-0">
                    <div class="w-12 h-12 border-4 border-purple-500/30 border-t-purple-500 rounded-full animate-spin"></div>
                </div>
            </div>

            <div class="glass-panel p-5 rounded-2xl mb-8">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-server text-purple-400"></i> Pilih Server Resolusi
                </p>
                <div id="server-list" class="flex flex-wrap gap-2"></div>
            </div>
        </div>

        <div id="exp-banner" class="glass-panel bg-gradient-to-r from-purple-900/40 to-blue-900/40 border border-purple-500/30 rounded-2xl p-5 flex flex-col md:flex-row justify-between items-center mb-8 hidden animate-fade" style="animation-delay: 100ms;">
            <div class="mb-4 md:mb-0 text-center md:text-left">
                <h3 class="font-black text-white text-lg"><i class="fa-solid fa-gift text-yellow-400 mr-2 drop-shadow-[0_0_10px_rgba(250,204,21,0.8)]"></i>Hadiah Menonton</h3>
                <p class="text-xs text-gray-300" id="exp-status">Tonton anime ini selama beberapa saat untuk mendapatkan EXP.</p>
            </div>
            <button id="claim-exp-btn" disabled class="glass-button text-gray-400 font-bold py-2.5 px-6 rounded-xl cursor-not-allowed">
                Tunggu Sebentar...
            </button>
        </div>

        <div class="mb-10 animate-fade" style="animation-delay: 200ms;">
            <h2 class="text-xl font-black mb-4 flex items-center gap-3 text-white">
                <div class="w-2 h-6 bg-purple-500 rounded-full"></div> Link Download
            </h2>
            <div id="download-box" class="space-y-4"></div>
        </div>

        <div class="animate-fade" style="animation-delay: 300ms;">
            <h2 class="text-xl font-black mb-4 flex items-center gap-3 text-white">
                <div class="w-2 h-6 bg-green-500 rounded-full"></div> Diskusi Episode
            </h2>
            
            <div class="glass-panel p-5 rounded-2xl mb-6">
                <textarea id="comment-input" rows="3" class="w-full bg-black/40 text-sm text-white p-4 rounded-xl border border-white/10 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 mb-3 shadow-inner resize-none" placeholder="Bagaimana pendapatmu tentang episode ini?"></textarea>
                <div class="flex justify-end">
                    <button id="post-comment-btn" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white text-sm font-bold py-2.5 px-6 rounded-xl shadow-[0_0_15px_rgba(168,85,247,0.4)] transition transform hover:-translate-y-1">Kirim Komentar</button>
                </div>
            </div>

            <div id="comments-list" class="space-y-4 pb-10"></div>
        </div>
    </main>

    <div id="public-profile-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] hidden backdrop-blur-md px-4 transition-opacity">
        <div class="glass-panel rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl relative border border-white/10">
            <div class="h-24 bg-gradient-to-r from-purple-800 to-blue-900 opacity-80"></div>
            <div class="px-6 pb-8 relative -mt-12 text-center">
                <img id="modal-avatar" src="" class="w-24 h-24 rounded-full border-4 border-[#0b0f19] mx-auto object-cover bg-gray-900 mb-3 shadow-xl">
                <h3 id="modal-name" class="text-xl font-black text-white"></h3>
                <p class="text-xs text-gray-400 mb-1 font-mono">ID: <span id="modal-id"></span></p>
                <p class="text-xs font-bold mb-5 uppercase tracking-widest" id="modal-role"></p>
                
                <div class="flex justify-center gap-3 mb-6">
                    <div class="bg-white/5 px-4 py-3 rounded-xl border border-white/10 w-1/2">
                        <span class="block text-[10px] text-gray-400 uppercase tracking-wider mb-1">Level</span>
                        <span id="modal-level" class="text-xl font-black text-purple-400"></span>
                    </div>
                    <div class="bg-white/5 px-4 py-3 rounded-xl border border-white/10 w-1/2">
                        <span class="block text-[10px] text-gray-400 uppercase tracking-wider mb-1">Total EXP</span>
                        <span id="modal-exp" class="text-xl font-black text-green-400"></span>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button id="add-friend-btn" class="flex-1 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 text-white font-bold py-2.5 rounded-xl transition shadow-lg text-sm">
                        <i class="fa-solid fa-user-plus mr-2"></i>Tambah Teman
                    </button>
                    <button onclick="closeModal()" class="px-5 py-2.5 glass-button text-white font-bold rounded-xl transition text-sm">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        const API_BASE = "https://api-nanas.my.id/api/nonton/samehadaku";
        const urlParams = new URLSearchParams(window.location.search);
        const episodeUrl = urlParams.get('episodeUrl');
        const slug = episodeUrl ? episodeUrl.replace(/\/$/, '').split('/').pop() : 'unknown';
        
        let currentUserData = null;
        let selectedUserId = null;

        async function initWatch() {
            if(!episodeUrl) {
                document.getElementById('episode-title').innerText = "URL Episode Tidak Ditemukan";
                return;
            }
            try {
                const dlRes = await fetch(`${API_BASE}/download.php?url=${encodeURIComponent(episodeUrl)}`);
                const dlData = await dlRes.json();
                
                if(!dlData || !dlData.status) {
                    document.getElementById('episode-title').innerText = "Gagal memuat detail episode.";
                    return;
                }
                
                const result = dlData.result;
                document.getElementById('episode-title').innerText = result.title || "Selesai Memuat";

                const serverList = document.getElementById('server-list');
                serverList.innerHTML = ""; 
                
                const availableServers = result.servers && result.servers.length > 0 ? result.servers : [
                    { id: "1", name: "Server 1 HD" },
                    { id: "2", name: "Server 2" },
                    { id: "3", name: "Server 3" },
                    { id: "4", name: "Server 4" }
                ];

                availableServers.forEach(srv => {
                    const btn = document.createElement('button');
                    btn.className = "glass-button px-4 py-2 text-xs font-bold rounded-lg text-white transition-all";
                    btn.innerText = srv.name;
                    btn.onclick = (e) => {
                        document.querySelectorAll('#server-list button').forEach(b => {
                            b.classList.remove('bg-purple-600', 'border-purple-400', 'shadow-[0_0_10px_rgba(168,85,247,0.5)]');
                            b.classList.add('glass-button');
                        });
                        e.target.classList.remove('glass-button');
                        e.target.classList.add('bg-purple-600', 'border-purple-400', 'shadow-[0_0_10px_rgba(168,85,247,0.5)]');
                        switchServer(srv.id);
                    };
                    serverList.appendChild(btn);
                });

                if(serverList.children.length > 0) {
                    serverList.children[0].click();
                }

                // Render Download Box
                const dlBox = document.getElementById('download-box');
                if (result.downloads && Array.isArray(result.downloads) && result.downloads.length > 0) {
                    dlBox.innerHTML = result.downloads.map(fmt => `
                        <div class="glass-panel rounded-2xl p-4 overflow-hidden relative">
                            <div class="absolute top-0 left-0 w-1 bg-purple-500 h-full"></div>
                            <span class="inline-block bg-white/10 text-xs font-black px-3 py-1 rounded-md text-white tracking-widest uppercase mb-3 border border-white/5">${fmt.format || 'MP4'}</span>
                            <div class="divide-y divide-white/5">
                                ${(fmt.qualities || []).map(q => `
                                    <div class="py-3 flex flex-col md:flex-row md:items-center justify-between gap-3">
                                        <span class="text-sm font-bold text-gray-200"><i class="fa-solid fa-display mr-2 text-purple-400"></i> Resolusi ${q.quality || 'Normal'}</span>
                                        <div class="flex flex-wrap gap-2">
                                            ${(q.links || []).map(lnk => `
                                                <a href="${lnk.url}" target="_blank" class="glass-button px-3 py-1.5 text-[11px] font-bold rounded-lg text-white hover:text-white flex items-center hover:bg-green-600/50 hover:border-green-500">
                                                    <i class="fa-solid fa-cloud-arrow-down mr-1.5 text-gray-300"></i> ${lnk.host || 'Link'}
                                                </a>
                                            `).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('');
                } else {
                    dlBox.innerHTML = '<div class="glass-panel p-4 rounded-2xl text-center text-gray-400 text-sm">Link download tidak ditemukan untuk episode ini.</div>';
                }

            } catch(e) { 
                console.error(e); 
                document.getElementById('episode-title').innerText = "Terjadi kesalahan koneksi API.";
            }
        }

        async function switchServer(serverId) {
            try {
                const streamRes = await fetch(`${API_BASE}/stream.php?slug=${slug}&server=${serverId}`);
                const streamData = await streamRes.json();
                
                let videoUrl = "";
                if(streamData.status && streamData.result) {
                    if (typeof streamData.result === 'object' && streamData.result.stream_url) {
                        videoUrl = streamData.result.stream_url;
                    } else if (typeof streamData.result === 'string') {
                        videoUrl = streamData.result;
                    }
                }
                
                if (videoUrl) {
                    document.getElementById('video-player').src = videoUrl;
                } else {
                    console.error("URL Stream tidak ditemukan dalam format respons.");
                }
            } catch(e) { console.error(e); }
        }

        async function initPage() {
            initWatch();
            const { data: { session } } = await supabaseClient.auth.getSession();
            if(session) {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                currentUserData = data;
                setupExpSystem();
            }
            loadComments();
        }

        function setupExpSystem() {
            const expBanner = document.getElementById('exp-banner');
            const claimBtn = document.getElementById('claim-exp-btn');
            const statusTxt = document.getElementById('exp-status');
            
            expBanner.classList.remove('hidden');

            const requiredTime = 30; 
            let timer = requiredTime;
            
            const interval = setInterval(() => {
                timer--;
                if(timer <= 0) {
                    clearInterval(interval);
                    statusTxt.innerHTML = "<span class='text-green-400 font-bold'>EXP Siap Diklaim!</span> Terima kasih sudah menonton.";
                    claimBtn.innerText = "Klaim EXP!";
                    claimBtn.disabled = false;
                    claimBtn.className = "bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 hover:to-yellow-500 text-black font-black py-2.5 px-6 rounded-xl transition shadow-[0_0_20px_rgba(234,179,8,0.6)] animate-bounce transform hover:scale-105";
                }
            }, 1000);

            claimBtn.addEventListener('click', async () => {
                claimBtn.disabled = true;
                claimBtn.innerText = "Memproses...";

                const gainedExp = Math.floor(Math.random() * 100) + 50; 
                let newExp = currentUserData.exp + gainedExp;
                let newLevel = Math.floor(newExp / 500) + 1;
                
                let levelUpMsg = newLevel > currentUserData.level ? `🎉 LEVEL UP! Kamu naik ke Level ${newLevel}.` : '';

                await supabaseClient.from('profiles').update({ exp: newExp, level: newLevel }).eq('id', currentUserData.id);
                
                alert(`Selamat! Kamu mendapat ${gainedExp} EXP. ${levelUpMsg}`);
                expBanner.classList.add('hidden'); 
            });
        }

        async function loadComments() {
    const list = document.getElementById('comments-list');
    list.innerHTML = '<div class="text-center py-6"><div class="w-8 h-8 border-2 border-purple-500/30 border-t-purple-500 rounded-full animate-spin mx-auto"></div></div>';

    const { data, error } = await supabaseClient
        .from('comments')
        .select(`id, content, created_at, user_id, profiles(*)`) 
        .eq('episode_slug', slug)
        .order('created_at', { ascending: false });

    if(error) {
        console.error("Supabase Error:", error);
        list.innerHTML = '<div class="glass-panel p-6 rounded-2xl text-center"><p class="text-red-400 text-sm">Gagal memuat komentar. Periksa konsol browser.</p></div>';
        return;
    }

    if(!data || data.length === 0) {
        list.innerHTML = '<div class="glass-panel p-6 rounded-2xl text-center"><p class="text-gray-400 text-sm">Belum ada komentar. Jadilah yang pertama berkomentar!</p></div>';
        return;
    }

    list.innerHTML = data.map(c => {
        // Fallback aman jika data profil kosong
        const prof = c.profiles || { full_name: 'Anonim', avatar_url: 'https://via.placeholder.com/150', role: 'user', level: 0 };
        
        // Memastikan role dicek menggunakan huruf kecil sesuai database ('breaker' & 'owner')
        const userRole = prof.role ? prof.role.toLowerCase() : 'user';
        const isOwner = userRole === 'owner';
        const isBreaker = userRole === 'breaker';

        let nameClass = 'text-white';
        if (isOwner) nameClass = 'role-owner';
        else if (isBreaker) nameClass = 'role-breaker';

        let roleBadge = '';
        if (isOwner) {
            roleBadge = `<span class="bg-red-900/80 border border-red-500/30 text-red-200 text-[10px] px-2 py-0.5 rounded-md font-bold shadow-inner"><i class="fa-solid fa-crown mr-1"></i>Owner</span>`;
        } else if (isBreaker) {
            roleBadge = `<span class="bg-purple-950/80 border border-purple-500/50 text-purple-200 text-[10px] px-2 py-0.5 rounded-md font-bold shadow-[0_0_8px_rgba(168,85,247,0.6)]"><i class="fa-solid fa-wand-magic-sparkles mr-1 text-cyan-400"></i>Breaker</span>`;
        }

        // Perbaikan escape character pada onclick menggunakan \" agar string ID aman dibaca browser
        return `
        <div class="glass-panel p-4 rounded-2xl flex gap-4 transition hover:bg-white/5">
            <img src="${prof.avatar_url || 'https://via.placeholder.com/150'}" onclick="openProfile(\"${c.user_id}\")" class="w-12 h-12 rounded-full border-2 border-white/10 object-cover cursor-pointer hover:border-purple-400 hover:shadow-[0_0_15px_rgba(168,85,247,0.5)] transition" title="Lihat Profil">
            <div class="flex-1">
                <div class="flex flex-wrap items-center gap-2 mb-1">
                    <span onclick="openProfile(\"${c.user_id}\")" class="font-bold text-sm cursor-pointer hover:underline ${nameClass}">${prof.full_name || 'Anonim'}</span>
                    <span class="bg-purple-900/80 border border-purple-500/30 text-purple-200 text-[10px] px-2 py-0.5 rounded-md font-bold shadow-inner">Lv.${prof.level || 0}</span>
                    ${roleBadge}
                </div>
                <p class="text-gray-300 text-sm leading-relaxed mt-1">${c.content}</p>
            </div>
        </div>
        `;
    }).join('');
}


        document.getElementById('post-comment-btn').addEventListener('click', async () => {
            if(!currentUserData) {
                alert("Silakan Login terlebih dahulu untuk berkomentar!");
                window.location.href = "auth.html";
                return;
            }
            const content = document.getElementById('comment-input').value;
            if(!content.trim()) return;

            const btn = document.getElementById('post-comment-btn');
            btn.innerText = "Mengirim..."; btn.disabled = true;

            await supabaseClient.from('comments').insert({ user_id: currentUserData.id, episode_slug: slug, content: content });
            
            document.getElementById('comment-input').value = '';
            btn.innerText = "Kirim Komentar"; btn.disabled = false;
            loadComments();
        });

        async function openProfile(userId) {
            selectedUserId = userId;
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', userId).single();
            if(!data) return;

            document.getElementById('modal-avatar').src = data.avatar_url;
            document.getElementById('modal-name').innerText = data.full_name;
            document.getElementById('modal-id').innerText = `#${data.user_id}`;
            document.getElementById('modal-level').innerText = data.level;
            document.getElementById('modal-exp').innerText = data.exp;
            
            const roleEl = document.getElementById('modal-role');
            if (data.role === 'owner') {
                roleEl.innerText = '👑 Owner Server';
                roleEl.className = 'text-[11px] font-black mb-5 uppercase tracking-widest role-owner';
            } else if (data.role === 'breaker') {
                roleEl.innerText = '🌌 Nebula Breaker';
                roleEl.className = 'text-[11px] font-black mb-5 uppercase tracking-widest role-breaker';
            } else {
                roleEl.innerText = 'Wibu Member';
                roleEl.className = 'text-[11px] font-black mb-5 uppercase tracking-widest text-blue-400';
            }

            const addFriendBtn = document.getElementById('add-friend-btn');
            if(currentUserData && currentUserData.id !== userId) {
                addFriendBtn.classList.remove('hidden');
            } else {
                addFriendBtn.classList.add('hidden'); 
            }

            document.getElementById('public-profile-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('public-profile-modal').classList.add('hidden'); }

        document.getElementById('add-friend-btn').addEventListener('click', async () => {
            if(!currentUserData) return alert("Silakan Login terlebih dahulu!");
            
            const btn = document.getElementById('add-friend-btn');
            btn.innerText = "Mengirim Request...";
            
            const { error } = await supabaseClient.from('friends').insert({
                requester_id: currentUserData.id,
                receiver_id: selectedUserId,
                status: 'pending'
            });

            if(error) {
                alert("Permintaan pertemanan sudah dikirim sebelumnya atau terjadi kesalahan!");
            } else {
                alert("Permintaan pertemanan berhasil dikirim!");
            }
            btn.innerHTML = `<i class="fa-solid fa-user-plus mr-2"></i>Tambah Teman`;
            closeModal();
        });

        initPage();
    </script>
</body>
</html>
